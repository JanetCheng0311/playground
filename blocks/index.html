<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Stack the falling blocks and clear lines.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230033ff'/%3E%3Cg fill='%23fff'%3E%3Crect x='14' y='14' width='16' height='16' rx='3'/%3E%3Crect x='34' y='14' width='16' height='16' rx='3'/%3E%3Crect x='34' y='34' width='16' height='16' rx='3'/%3E%3C/g%3E%3C/svg%3E">
<title>Blocks — Playground</title>
<style>
  :root{ --blue:#0033ff; --white:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:var(--blue);color:var(--white);font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;touch-action:none;min-height:100dvh;display:flex;flex-direction:column}
  header{display:flex;align-items:baseline;gap:22px;padding:22px clamp(20px,4vw,40px);font-size:14px;font-weight:500;flex:0 0 auto;flex-wrap:wrap}
  header a,header button{font:inherit;color:var(--white);background:none;border:none;cursor:pointer;text-decoration:none;
    padding:2px 0;border-bottom:1px solid transparent;transition:border-color .15s}
  header a:hover,header button:hover{border-bottom-color:var(--white)}
  header .title{font-weight:600;margin-right:auto}
  header .title em{font-style:normal;opacity:.6;font-weight:400;margin-left:10px}
  header .stat{font-variant-numeric:tabular-nums;font-weight:600}
  header .stat b{font-weight:700}
  header button.off{opacity:.5}
  main{flex:1 1 auto;display:flex;align-items:center;justify-content:center;gap:clamp(16px,3vw,30px);padding:0 16px 16px}
  #wrap{position:relative}
  canvas{display:block;background:rgba(255,255,255,.10);border-radius:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.22)}
  .side{display:flex;flex-direction:column;gap:16px;align-self:flex-start;margin-top:4px}
  .side .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.6;font-weight:600}
  #next{background:rgba(255,255,255,.10);border-radius:10px;display:block}
  #over{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:rgba(0,18,80,.78);border-radius:12px;backdrop-filter:blur(3px)}
  #over.show{display:flex}
  #over p{font-size:clamp(22px,4vw,34px);font-weight:800}
  #over button{font:inherit;font-weight:700;font-size:16px;color:var(--blue);background:var(--white);border:none;border-radius:999px;padding:12px 26px;cursor:pointer}
  .pad{position:fixed;left:0;right:0;bottom:16px;z-index:10;display:none;justify-content:center;gap:7px;padding:0 8px}
  .pad button{flex:0 1 56px;height:54px;border-radius:14px;border:1.5px solid rgba(255,255,255,.5);background:rgba(255,255,255,.1);
    color:var(--white);font-size:20px;font-weight:700;cursor:pointer}
  .pad #bHold{font-size:12px;letter-spacing:.04em}
  .pad button:active{background:rgba(255,255,255,.25)}
  .hint{padding:0 clamp(20px,4vw,40px) 18px;font-size:12px;opacity:.55;flex:0 0 auto}
  @media (max-width:760px){
    .pad{display:flex} .hint{display:none}
    main{padding-bottom:88px; gap:10px}
    .side{gap:10px}
    .side .lbl{font-size:10px}
    #hold,#next{width:56px;height:56px}
  }
</style>
</head>
<body>
<header>
  <span class="title">Blocks<em>stack &amp; clear lines</em></span>
  <span class="stat">score <b id="score">0</b></span>
  <span class="stat">best <b id="best">0</b></span>
  <span class="stat">lines <b id="lines">0</b></span>
  <button id="snd">sound</button>
  <button id="new">new game</button>
  <a href="../">playground</a>
</header>
<main>
  <div id="wrap">
    <canvas id="board"></canvas>
    <div id="over"><p id="overMsg">Game over</p><button id="retry">play again</button></div>
  </div>
  <div class="side">
    <span class="lbl">hold</span>
    <canvas id="hold" width="96" height="96"></canvas>
    <span class="lbl">next</span>
    <canvas id="next" width="96" height="96"></canvas>
  </div>
</main>
<div class="pad">
  <button id="bHold">hold</button><button id="bL">‹</button><button id="bRot">⟳</button><button id="bR">›</button><button id="bDown">↓</button><button id="bDrop">⤓</button>
</div>
<p class="hint">← → move · ↑ rotate · ↓ soft drop · space hard drop · C hold</p>
<script>
(() => {
"use strict";
const COLS=10, ROWS=20;
const board=document.getElementById("board"), ctx=board.getContext("2d");
const nextC=document.getElementById("next"), nctx=nextC.getContext("2d");
const holdC=document.getElementById("hold"), hctx=holdC.getContext("2d");
const DPR=Math.min(devicePixelRatio||1,2);
let cs;                                   // cell size (css px)

const COLORS=["#62d0ff","#ffd23b","#ff7ec0","#9af2c0","#c2a0ff","#ff9f5c","#ffffff"];
const SHAPES=[
  [[1,1,1,1]],                 // I
  [[1,1],[1,1]],               // O
  [[0,1,0],[1,1,1]],           // T
  [[0,1,1],[1,1,0]],           // S
  [[1,1,0],[0,1,1]],           // Z
  [[1,0,0],[1,1,1]],           // J
  [[0,0,1],[1,1,1]],           // L
];

let grid, cur, nextPiece, score, lines, level, dropMs, acc, last, over, bag, hold, holdUsed;
let best=+(localStorage.getItem("blocks-best")||0);
document.getElementById("best").textContent=best;
function setScore(){ document.getElementById("score").textContent=score;
  if(score>best){ best=score; localStorage.setItem("blocks-best",best); document.getElementById("best").textContent=best; } }

// ---- sound ----
let actx=null, master=null, soundOn=localStorage.getItem("blocks-sound")!=="off";
function audio(){ if(actx){ if(actx.state==="suspended")actx.resume(); return actx; }
  try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; }
  master=actx.createGain(); master.gain.value=0.3; master.connect(actx.destination); return actx; }
function blip(type,f0,f1,dur,vol){ if(!soundOn)return; const a=audio(); if(!a)return; const t=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type=type; o.frequency.setValueAtTime(f0,t); if(f1!=null)o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.005); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(master); o.start(t); o.stop(t+dur+0.02); }
function noiseHit(dur,vol,lp){ if(!soundOn)return; const a=audio(); if(!a)return; const t=a.currentTime;
  if(!a._nb){ const len=a.sampleRate*0.3|0,b=a.createBuffer(1,len,a.sampleRate),d=b.getChannelData(0); for(let i=0;i<len;i++)d[i]=Math.random()*2-1; a._nb=b; }
  const s=a.createBufferSource(); s.buffer=a._nb; const f=a.createBiquadFilter(); f.type="lowpass"; f.frequency.value=lp||1400;
  const g=a.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); s.connect(f).connect(g).connect(master); s.start(t); s.stop(t+dur+0.02); }
const SND={
  rotate(){ blip("square",520,660,0.05,0.16); },
  lock(){ blip("sine",175,90,0.12,0.3); noiseHit(0.05,0.14,1500); },
  next(){ blip("triangle",880,null,0.04,0.07); },
  drop(){ noiseHit(0.11,0.2,2400); },
  clear(n){ if(!soundOn)return; const a=audio(); if(!a)return; const notes=[523,659,784,988,1319];
    for(let i=0;i<Math.min(n+1,5);i++){ const t=a.currentTime+i*0.06,o=a.createOscillator(),g=a.createGain();
      o.type="sine"; o.frequency.value=notes[i]; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.22,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.26);
      o.connect(g).connect(master); o.start(t); o.stop(t+0.28); } },
};

function layout(){
  const maxH=Math.min(window.innerHeight-(window.innerWidth<760?200:170), 760);
  const maxW=window.innerWidth-(window.innerWidth<760?96:170);
  cs=Math.floor(Math.min(maxW/COLS, maxH/ROWS));
  cs=Math.max(14,cs);
  board.style.width=COLS*cs+"px"; board.style.height=ROWS*cs+"px";
  board.width=COLS*cs*DPR; board.height=ROWS*cs*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  draw();
}
addEventListener("resize",layout);

function newGrid(){ return Array.from({length:ROWS},()=>Array(COLS).fill(0)); }
function bagNext(){ if(!bag||!bag.length){ bag=[0,1,2,3,4,5,6]; for(let i=bag.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[bag[i],bag[j]]=[bag[j],bag[i]];}} return bag.pop(); }
function makePiece(type){ return {type,shape:SHAPES[type].map(r=>r.slice()),x:(COLS>>1)-1,y:0}; }
function spawn(){
  cur=makePiece(nextPiece); nextPiece=bagNext();
  cur.x=(COLS - cur.shape[0].length)>>1; cur.y=0;
  if(collides(cur.shape,cur.x,cur.y)){ over=true; document.getElementById("over").classList.add("show"); }
  else SND.next();
  drawNext();
}
function collides(sh,x,y){
  for(let r=0;r<sh.length;r++)for(let c=0;c<sh[r].length;c++){ if(!sh[r][c])continue;
    const gx=x+c, gy=y+r; if(gx<0||gx>=COLS||gy>=ROWS) return true; if(gy>=0&&grid[gy][gx]) return true; }
  return false;
}
function rotate(sh){ const R=sh.length,C=sh[0].length, out=Array.from({length:C},()=>Array(R).fill(0));
  for(let r=0;r<R;r++)for(let c=0;c<C;c++) out[c][R-1-r]=sh[r][c]; return out; }

function holdPiece(){
  if(over||holdUsed)return;
  if(hold==null){ hold=cur.type; spawn(); }
  else { const t=hold; hold=cur.type; cur=makePiece(t); cur.x=(COLS-cur.shape[0].length)>>1; cur.y=0;
    if(collides(cur.shape,cur.x,cur.y)){ over=true; document.getElementById("over").classList.add("show"); } }
  holdUsed=true; drawHold(); draw();
}
function lockPiece(){
  holdUsed=false;                          // a new piece may be held again
  for(let r=0;r<cur.shape.length;r++)for(let c=0;c<cur.shape[r].length;c++){ if(cur.shape[r][c]){ const gy=cur.y+r, gx=cur.x+c; if(gy>=0) grid[gy][gx]=cur.type+1; } }
  // clear lines
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){ if(grid[r].every(v=>v)){ grid.splice(r,1); grid.unshift(Array(COLS).fill(0)); cleared++; r++; } }
  SND.lock();
  if(cleared){ lines+=cleared; score+=[0,100,300,500,800][cleared]*level; level=1+Math.floor(lines/10); dropMs=Math.max(90,650-(level-1)*55);
    document.getElementById("lines").textContent=lines; setScore(); SND.clear(cleared); }
  spawn();
}
function step(dir){ if(over)return; if(!collides(cur.shape,cur.x+dir,cur.y)){ cur.x+=dir; draw(); } }
function softDrop(){ if(over)return; if(!collides(cur.shape,cur.x,cur.y+1)){ cur.y++; } else { lockPiece(); } draw(); acc=0; }
function hardDrop(){ if(over)return; SND.drop(); while(!collides(cur.shape,cur.x,cur.y+1)){ cur.y++; score+=2; } lockPiece(); setScore(); draw(); }
function tryRotate(){ if(over)return; const rot=rotate(cur.shape);
  for(const k of [0,-1,1,-2,2]){ if(!collides(rot,cur.x+k,cur.y)){ cur.shape=rot; cur.x+=k; SND.rotate(); draw(); return; } } }

function cellRect(x,y,col){ ctx.fillStyle=col; const p=Math.max(1,cs*0.06);
  ctx.fillRect(x*cs+p,y*cs+p,cs-2*p,cs-2*p);
  ctx.fillStyle="rgba(255,255,255,0.22)"; ctx.fillRect(x*cs+p,y*cs+p,cs-2*p,Math.max(1,cs*0.16)); }
function draw(){
  ctx.clearRect(0,0,COLS*cs,ROWS*cs);
  // grid faint lines
  ctx.strokeStyle="rgba(255,255,255,0.06)"; ctx.lineWidth=1;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ ctx.strokeRect(c*cs,r*cs,cs,cs); }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ if(grid[r][c]) cellRect(c,r,COLORS[grid[r][c]-1]); }
  if(cur && !over){
    // ghost
    let gy=cur.y; while(!collides(cur.shape,cur.x,gy+1)) gy++;
    for(let r=0;r<cur.shape.length;r++)for(let c=0;c<cur.shape[r].length;c++){ if(cur.shape[r][c]){ ctx.fillStyle="rgba(255,255,255,0.16)"; const p=Math.max(1,cs*0.06); ctx.fillRect((cur.x+c)*cs+p,(gy+r)*cs+p,cs-2*p,cs-2*p);} }
    for(let r=0;r<cur.shape.length;r++)for(let c=0;c<cur.shape[r].length;c++){ if(cur.shape[r][c]){ const yy=cur.y+r; if(yy>=0) cellRect(cur.x+c,yy,COLORS[cur.type]); } }
  }
}
function drawMini(g,type,dim){
  g.clearRect(0,0,96,96); if(type==null)return; const sh=SHAPES[type], w=sh[0].length, h=sh.length;
  const u=Math.min(96/(w+1),96/(h+1)), ox=(96-w*u)/2, oy=(96-h*u)/2;
  for(let r=0;r<h;r++)for(let c=0;c<w;c++){ if(sh[r][c]){ g.fillStyle=COLORS[type]; g.globalAlpha=dim?0.4:1; const p=u*0.08; g.fillRect(ox+c*u+p,oy+r*u+p,u-2*p,u-2*p); g.globalAlpha=1;} }
}
function drawNext(){ drawMini(nctx,nextPiece,false); }
function drawHold(){ drawMini(hctx,hold,holdUsed); }

function loop(t){
  if(!over){ if(!last)last=t; acc+=t-last; last=t;
    if(acc>=dropMs){ acc=0; if(!collides(cur.shape,cur.x,cur.y+1)) cur.y++; else lockPiece(); draw(); }
  } else last=t;
  requestAnimationFrame(loop);
}

function reset(){
  grid=newGrid(); score=0; lines=0; level=1; dropMs=650; acc=0; last=0; over=false; bag=null;
  hold=null; holdUsed=false; drawHold();
  nextPiece=bagNext();
  document.getElementById("score").textContent="0"; document.getElementById("lines").textContent="0";
  document.getElementById("over").classList.remove("show");
  spawn(); layout();
}

addEventListener("keydown",e=>{
  const k=e.key.toLowerCase();
  if(k==="arrowleft"||k==="a"){step(-1);e.preventDefault();}
  else if(k==="arrowright"||k==="d"){step(1);e.preventDefault();}
  else if(k==="arrowdown"||k==="s"){softDrop();e.preventDefault();}
  else if(k==="arrowup"||k==="w"){tryRotate();e.preventDefault();}
  else if(k===" "){hardDrop();e.preventDefault();}
  else if(k==="c"||k==="shift"){holdPiece();e.preventDefault();}
});
const press=(id,fn)=>{ const b=document.getElementById(id); b.addEventListener("click",fn); };
press("bL",()=>step(-1)); press("bR",()=>step(1)); press("bRot",tryRotate); press("bDown",softDrop); press("bDrop",hardDrop); press("bHold",holdPiece);
const sndBtn=document.getElementById("snd");
function syncSnd(){ sndBtn.textContent=soundOn?"sound":"muted"; sndBtn.classList.toggle("off",!soundOn); }
sndBtn.addEventListener("click",()=>{ soundOn=!soundOn; localStorage.setItem("blocks-sound",soundOn?"on":"off"); syncSnd(); if(soundOn)audio(); });
syncSnd();
document.getElementById("new").addEventListener("click",reset);
document.getElementById("retry").addEventListener("click",reset);

reset();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
