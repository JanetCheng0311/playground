<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Fill the screen with shapes. Pick a shape, size and density, and toggle float or shake.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230033ff'/%3E%3Crect x='16' y='16' width='32' height='32' fill='none' stroke='white' stroke-width='5'/%3E%3C/svg%3E">
<title>Shapes — Playground</title>
<style>
  :root{ --blue:#0033ff; --white:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--blue);color:var(--white);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;
    touch-action:none;
  }
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair}

  header{
    position:fixed;top:0;left:0;right:0;z-index:10;
    display:flex;align-items:baseline;gap:24px;
    padding:22px clamp(20px,4vw,40px);
    pointer-events:none;
    font-size:14px;font-weight:500;
  }
  header a, header button{
    pointer-events:auto;
    font:inherit;color:var(--white);
    background:none;border:none;cursor:pointer;
    text-decoration:none;padding:2px 0;
    border-bottom:1px solid transparent;
    transition:border-color .15s ease, opacity .15s ease;
  }
  header a:hover, header button:hover{border-bottom-color:var(--white)}
  header a:focus-visible, header button:focus-visible{outline:2px solid var(--white);outline-offset:4px}
  header .title{font-weight:600;margin-right:auto;pointer-events:none}
  header .title em{font-style:normal;opacity:.6;font-weight:400;margin-left:10px}
  header .spacer{flex:0 0 8px}

  .panel{
    position:fixed;left:clamp(20px,4vw,40px);bottom:22px;z-index:10;
    display:flex;flex-direction:column;gap:14px;
    font-size:13px;font-weight:500;
  }
  .shapes-row{display:flex;gap:6px;flex-wrap:wrap;max-width:280px}
  .shapes-row button{
    pointer-events:auto;
    background:none;border:1px solid rgba(255,255,255,.45);
    border-radius:50%;width:38px;height:38px;cursor:pointer;
    display:grid;place-items:center;
    transition:background .15s ease, border-color .15s ease;
  }
  .shapes-row button svg{width:18px;height:18px;display:block}
  .shapes-row button.on{background:var(--white);border-color:var(--white)}
  .shapes-row button.on svg *{stroke:var(--blue);fill:var(--blue)}
  .shapes-row button svg *{stroke:var(--white);fill:none;stroke-width:2}
  .shapes-row button[data-fill] svg *{fill:var(--white);stroke:none}
  .shapes-row button.on[data-fill] svg *{fill:var(--blue)}

  .sliders{display:flex;flex-direction:column;gap:9px}
  .sliders label{display:flex;align-items:center;gap:12px}
  .sliders label span{width:42px;opacity:.75}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:140px;height:22px;background:transparent;cursor:pointer;
  }
  input[type=range]::-webkit-slider-runnable-track{height:1px;background:rgba(255,255,255,.6)}
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;
    background:var(--white);margin-top:-6px;
  }
  input[type=range]::-moz-range-track{height:1px;background:rgba(255,255,255,.6)}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--white);border:none}

  .toggles{display:flex;gap:18px}
  .toggles button{
    font:inherit;font-size:13px;font-weight:500;color:var(--white);
    background:none;border:none;cursor:pointer;padding:2px 0;
    opacity:.55;border-bottom:1px solid transparent;
    transition:opacity .15s ease, border-color .15s ease;
  }
  .toggles button:hover{opacity:.85}
  .toggles button.on{opacity:1;border-bottom-color:var(--white)}

  .hint{
    position:fixed;right:clamp(20px,4vw,40px);bottom:22px;z-index:10;
    font-size:12px;font-weight:400;opacity:.6;max-width:22ch;text-align:right;line-height:1.6;
  }
  @media (max-width:640px){
    .hint{display:none}
    header{gap:16px;padding:16px}
    .panel{bottom:16px;left:16px}
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<header>
  <span class="title">Shapes<em>shape generator</em></span>
  <button id="btnFill">fill</button>
  <button id="btnClear">clear</button>
  <button id="btnSave">save png</button>
  <span class="spacer"></span>
  <a href="../">playground</a>
</header>

<div class="panel">
  <div class="shapes-row" id="shapesRow" role="group" aria-label="Shape"></div>
  <div class="sliders">
    <label><span>size</span><input type="range" id="rSize" min="14" max="120" value="46"></label>
    <label><span>amount</span><input type="range" id="rAmount" min="10" max="320" value="120"></label>
  </div>
  <div class="toggles">
    <button id="tFloat" aria-pressed="false">float</button>
    <button id="tShake" aria-pressed="false">shake</button>
    <button id="tOutline" aria-pressed="false">outline</button>
  </div>
</div>

<p class="hint">tap empty space to add a shape, tap a shape to remove it</p>

<script>
(() => {
"use strict";
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
const DPR = Math.min(devicePixelRatio || 1, 2);
const TWO_PI = Math.PI*2;
let W = 0, H = 0;

function resize(){
  W = innerWidth; H = innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener("resize", resize);
resize();

/* ---------------- shape definitions ---------------- */
const SHAPES = ["circle","square","triangle","diamond","pentagon","hexagon","star","mix"];
const ICONS = {
  circle:   `<circle cx="12" cy="12" r="9"/>`,
  square:   `<rect x="3" y="3" width="18" height="18"/>`,
  triangle: `<path d="M12 3 L21 20 L3 20 Z"/>`,
  diamond:  `<path d="M12 2 L21 12 L12 22 L3 12 Z"/>`,
  pentagon: `<path d="M12 2 L22 9.5 L18 21 L6 21 L2 9.5 Z"/>`,
  hexagon:  `<path d="M7 3 L17 3 L22 12 L17 21 L7 21 L2 12 Z"/>`,
  star:     `<path d="M12 2 L14.6 9.2 L22 9.5 L16 14 L18.2 21 L12 16.8 L5.8 21 L8 14 L2 9.5 L9.4 9.2 Z"/>`,
  mix:      `<circle cx="7" cy="8" r="4"/><rect x="12" y="12" width="8" height="8"/>`,
};

function polygonPath(n, r, rot){
  ctx.beginPath();
  for (let i=0;i<n;i++){
    const a = rot - Math.PI/2 + i/n*TWO_PI;
    const px = Math.cos(a)*r, py = Math.sin(a)*r;
    i ? ctx.lineTo(px,py) : ctx.moveTo(px,py);
  }
  ctx.closePath();
}
function starPath(points, rOut, rIn, rot){
  ctx.beginPath();
  for (let i=0;i<points*2;i++){
    const a = rot - Math.PI/2 + i/(points*2)*TWO_PI;
    const rr = i%2 ? rIn : rOut;
    const px = Math.cos(a)*rr, py = Math.sin(a)*rr;
    i ? ctx.lineTo(px,py) : ctx.moveTo(px,py);
  }
  ctx.closePath();
}
function shapePath(type, r){
  switch(type){
    case "circle":   ctx.beginPath(); ctx.arc(0,0,r,0,TWO_PI); break;
    case "square":   polygonPath(4, r*1.18, Math.PI/4); break;
    case "triangle": polygonPath(3, r*1.15, 0); break;
    case "diamond":  polygonPath(4, r*1.15, 0); break;
    case "pentagon": polygonPath(5, r*1.1, 0); break;
    case "hexagon":  polygonPath(6, r*1.08, 0); break;
    case "star":     starPath(5, r*1.2, r*0.5, 0); break;
    default:         ctx.beginPath(); ctx.arc(0,0,r,0,TWO_PI);
  }
}

/* ---------------- state ---------------- */
let activeShape = "mix";
let outline = false, doFloat = false, doShake = false;
const shapes = [];
const MAX = 700;

function pickType(){
  if (activeShape !== "mix") return activeShape;
  const pool = SHAPES.slice(0, -1); // everything except "mix"
  return pool[(Math.random()*pool.length)|0];
}
function makeShape(x, y){
  const base = +document.getElementById("rSize").value;
  const r = (base/2) * (0.6 + Math.random()*0.8);
  return {
    x, y, r,
    type: pickType(),
    rot: Math.random()*TWO_PI,
    rotSpeed: (Math.random()-.5)*0.01,
    vx: (Math.random()-.5)*0.4,
    vy: (Math.random()-.5)*0.4,
    op: 0.55 + Math.random()*0.45,
    phase: Math.random()*TWO_PI,
  };
}

function addShape(x, y){
  if (shapes.length >= MAX) shapes.shift();
  shapes.push(makeShape(x, y));
}

function fillScreen(){
  const amount = +document.getElementById("rAmount").value;
  shapes.length = 0;
  let tries = 0;
  while (shapes.length < amount && tries < amount*20){
    tries++;
    const s = makeShape(Math.random()*W, Math.random()*H);
    // light spacing so it reads as composed, not a pile
    let ok = true;
    for (const o of shapes){
      if (Math.hypot(o.x-s.x, o.y-s.y) < (o.r + s.r)*0.62){ ok = false; break; }
    }
    if (ok) shapes.push(s);
  }
}

/* ---------------- drawing ---------------- */
function draw(t){
  ctx.clearRect(0,0,W,H);
  const move = (doFloat || doShake) && !reduceMotion;

  for (const s of shapes){
    let dx = 0, dy = 0;
    if (move){
      if (doFloat){
        s.x += s.vx; s.y += s.vy; s.rot += s.rotSpeed;
        // wrap around edges so the screen stays full
        if (s.x < -s.r) s.x = W + s.r; else if (s.x > W + s.r) s.x = -s.r;
        if (s.y < -s.r) s.y = H + s.r; else if (s.y > H + s.r) s.y = -s.r;
      }
      if (doShake){
        dx = Math.sin(t*0.02 + s.phase) * 2.2 + (Math.random()-.5)*1.6;
        dy = Math.cos(t*0.023 + s.phase*1.3) * 2.2 + (Math.random()-.5)*1.6;
      }
    }
    ctx.save();
    ctx.translate(s.x + dx, s.y + dy);
    if (doFloat && move) ctx.rotate(s.rot);
    shapePath(s.type, s.r);
    if (outline){
      ctx.strokeStyle = `rgba(255,255,255,${s.op})`;
      ctx.lineWidth = 1.6;
      ctx.stroke();
    } else {
      ctx.fillStyle = `rgba(255,255,255,${s.op})`;
      ctx.fill();
    }
    ctx.restore();
  }
  requestAnimationFrame(draw);
}

/* ---------------- shape picker UI ---------------- */
const row = document.getElementById("shapesRow");
SHAPES.forEach(type => {
  const b = document.createElement("button");
  b.title = type;
  b.setAttribute("aria-label", type);
  b.innerHTML = `<svg viewBox="0 0 24 24">${ICONS[type]}</svg>`;
  // filled preview icons read better for solid shapes
  b.setAttribute("data-fill","");
  if (type === activeShape) b.classList.add("on");
  b.addEventListener("click", () => {
    activeShape = type;
    [...row.children].forEach(c => c.classList.remove("on"));
    b.classList.add("on");
  });
  row.appendChild(b);
});

/* ---------------- toggles ---------------- */
function toggle(btn, set){
  const on = btn.classList.toggle("on");
  btn.setAttribute("aria-pressed", on);
  set(on);
}
document.getElementById("tFloat").addEventListener("click", e => toggle(e.currentTarget, v => doFloat = v));
document.getElementById("tShake").addEventListener("click", e => toggle(e.currentTarget, v => doShake = v));
document.getElementById("tOutline").addEventListener("click", e => toggle(e.currentTarget, v => outline = v));

/* ---------------- actions ---------------- */
document.getElementById("btnFill").addEventListener("click", fillScreen);
document.getElementById("btnClear").addEventListener("click", () => shapes.length = 0);
document.getElementById("btnSave").addEventListener("click", () => {
  // paint the blue background into the export
  const ex = document.createElement("canvas");
  ex.width = canvas.width; ex.height = canvas.height;
  const g = ex.getContext("2d");
  g.fillStyle = "#0033ff"; g.fillRect(0,0,ex.width,ex.height);
  g.drawImage(canvas, 0, 0);
  const a = document.createElement("a");
  a.download = "shapes.png"; a.href = ex.toDataURL("image/png"); a.click();
});

/* ---------------- pointer ---------------- */
canvas.addEventListener("pointerdown", e => {
  const x = e.clientX, y = e.clientY;
  for (let i = shapes.length-1; i >= 0; i--){
    if (Math.hypot(shapes[i].x - x, shapes[i].y - y) <= shapes[i].r + 6){
      shapes.splice(i,1); return;
    }
  }
  addShape(x, y);
});

fillScreen();
requestAnimationFrame(draw);
})();
</script>
</body>
</html>
