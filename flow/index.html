<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Generative flow-field line art. Regenerate, tweak, and save your own piece.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230033ff'/%3E%3Cpath d='M10 24c12 8 20-12 32-4s8 18 14 18' stroke='white' stroke-width='5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<title>Flow — Playground</title>
<style>
  :root{ --blue:#0033ff; --white:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--blue);color:var(--white);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;
    touch-action:none;
  }
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block}

  header{
    position:fixed;top:0;left:0;right:0;z-index:10;
    display:flex;align-items:baseline;gap:26px;
    padding:22px clamp(20px,4vw,40px);
    pointer-events:none;
    font-size:14px;font-weight:500;
  }
  header a, header button{
    pointer-events:auto;
    font:inherit;color:var(--white);
    background:none;border:none;cursor:pointer;
    text-decoration:none;
    padding:2px 0;
    border-bottom:1px solid transparent;
    transition:border-color .15s ease, opacity .15s ease;
  }
  header a:hover, header button:hover{border-bottom-color:var(--white)}
  header a:focus-visible, header button:focus-visible{outline:2px solid var(--white);outline-offset:4px}
  header .title{font-weight:600;margin-right:auto;pointer-events:none}
  header .title em{font-style:normal;opacity:.6;font-weight:400;margin-left:10px}

  .ctl{
    position:fixed;left:clamp(20px,4vw,40px);bottom:22px;z-index:10;
    display:flex;flex-direction:column;gap:10px;
    font-size:13px;font-weight:500;
  }
  .ctl label{display:flex;align-items:center;gap:12px}
  .ctl label span{width:46px;opacity:.75}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:140px;height:22px;background:transparent;cursor:pointer;
  }
  input[type=range]::-webkit-slider-runnable-track{height:1px;background:rgba(255,255,255,.6)}
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;
    background:var(--white);margin-top:-6px;
  }
  input[type=range]::-moz-range-track{height:1px;background:rgba(255,255,255,.6)}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--white);border:none}

  .hint{
    position:fixed;right:clamp(20px,4vw,40px);bottom:22px;z-index:10;
    font-size:12px;font-weight:400;opacity:.6;max-width:24ch;text-align:right;line-height:1.6;
  }
  @media (max-width:640px){
    .hint{display:none}
    header{gap:18px;padding:16px}
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<header>
  <span class="title">Flow<em>generative line fields</em></span>
  <button id="btnNew">new</button>
  <button id="btnSave">save png</button>
  <a href="../">playground</a>
</header>

<div class="ctl">
  <label><span>lines</span><input type="range" id="rLines" min="30" max="400" value="160"></label>
  <label><span>scale</span><input type="range" id="rScale" min="1" max="10" value="4"></label>
</div>

<p class="hint">tap anywhere for a new field grown from that point</p>

<script>
(() => {
"use strict";
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
const DPR = Math.min(devicePixelRatio || 1, 2);
let W = 0, H = 0;

function resize(){
  W = innerWidth; H = innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  restart();
}
addEventListener("resize", resize);

/* ---------- seeded classic 2D Perlin noise (the p5.js flow-field staple) ---------- */
let seed = 1;
function rnd(){ seed = (seed*1664525 + 1013904223) % 4294967296; return seed/4294967296; }
let perm = new Uint8Array(512);
function reseedNoise(){
  const p = new Uint8Array(256);
  for (let i=0;i<256;i++) p[i] = i;
  for (let i=255;i>0;i--){ const j = (rnd()*(i+1))|0; const tmp=p[i]; p[i]=p[j]; p[j]=tmp; }
  for (let i=0;i<512;i++) perm[i] = p[i&255];
}
function fade(t){ return t*t*t*(t*(t*6-15)+10); }
function grad2(h, x, y){
  switch(h&7){
    case 0: return  x+y; case 1: return  x-y; case 2: return -x+y; case 3: return -x-y;
    case 4: return  x;   case 5: return -x;   case 6: return  y;   default: return -y;
  }
}
function noise2(x, y){
  const X = Math.floor(x)&255, Y = Math.floor(y)&255;
  x -= Math.floor(x); y -= Math.floor(y);
  const u = fade(x), v = fade(y);
  const aa = perm[perm[X]+Y],   ab = perm[perm[X]+Y+1];
  const ba = perm[perm[X+1]+Y], bb = perm[perm[X+1]+Y+1];
  const lerp = (a,b,t) => a+(b-a)*t;
  return lerp(
    lerp(grad2(aa,x,y),   grad2(ba,x-1,y),   u),
    lerp(grad2(ab,x,y-1), grad2(bb,x-1,y-1), u), v
  ); // roughly -1..1
}

/* ---------- flow ribbons: long non-touching curves of varied weight ----------
   Fidenza-style composition: each ribbon follows the field, keeps a margin
   from every other ribbon (occupancy grid), and the empty blue between
   them is part of the picture. */
let drawing = false;
let noiseScale = 0.004;
let queue = [];          // ribbons waiting to be drawn (animated growth)
let occ, ow, oh;
const OCC = 6;           // occupancy cell px

function fieldAngle(x, y){
  const n = noise2(x*noiseScale, y*noiseScale)
          + 0.35*noise2(x*noiseScale*2.6 + 31.7, y*noiseScale*2.6 + 11.3);
  return n * Math.PI * 2.4;
}

function occIndex(x, y){ return ((y/OCC)|0)*ow + ((x/OCC)|0); }
function blocked(x, y, rad){
  if (x<rad||y<rad||x>W-rad||y>H-rad) return true;
  const r = Math.ceil(rad/OCC);
  const cx = (x/OCC)|0, cy = (y/OCC)|0;
  for (let j=-r;j<=r;j++) for (let i=-r;i<=r;i++){
    const X = cx+i, Y = cy+j;
    if (X<0||Y<0||X>=ow||Y>=oh) continue;
    if (occ[Y*ow+X]) return true;
  }
  return false;
}
function occupy(x, y, rad){
  const r = Math.ceil(rad/OCC);
  const cx = (x/OCC)|0, cy = (y/OCC)|0;
  for (let j=-r;j<=r;j++) for (let i=-r;i<=r;i++){
    const X = cx+i, Y = cy+j;
    if (X>=0&&Y>=0&&X<ow&&Y<oh) occ[Y*ow+X] = 1;
  }
}

/* trace one ribbon: walk the field both ways from a seed, collecting points */
function traceRibbon(seedPt, w){
  const margin = w/2 + 7;
  const pts = [];
  for (const dir of [1, -1]){
    let {x, y} = seedPt;
    const run = [];
    for (let s=0;s<600;s++){
      if (blocked(x, y, margin)) break;
      run.push({x, y});
      const a = fieldAngle(x, y);
      x += Math.cos(a)*3*dir;
      y += Math.sin(a)*3*dir;
    }
    if (dir === 1) pts.push(...run);
    else pts.unshift(...run.slice(1).reverse());
  }
  return pts;
}

function buildRibbons(count, origin){
  queue = [];
  // weighted widths: many thin threads, a few broad ribbons
  const widths = [2, 2, 3, 5, 5, 8, 13, 21, 34];
  for (let i=0;i<count*14 && queue.length<count;i++){
    let x, y;
    if (origin && rnd() < .6){
      const a = rnd()*Math.PI*2, d = (rnd()+rnd())/2 * Math.min(W,H)*0.5;
      x = origin.x + Math.cos(a)*d; y = origin.y + Math.sin(a)*d;
    } else { x = rnd()*W; y = rnd()*H; }
    const w = widths[(rnd()*widths.length)|0];
    if (blocked(x, y, w/2 + 7)) continue;
    const pts = traceRibbon({x, y}, w);
    const minLen = w*3 + 30;
    if (pts.length*3 < minLen) continue;          // too short: discard
    for (const p of pts) occupy(p.x, p.y, w/2 + 5);
    queue.push({ pts, w, o: rnd() < .18 ? .45 : .95, drawn: 1 });
  }
  // big ribbons first feels composed, then details fill in
  queue.sort((a,b) => b.w - a.w);
}

function step(){
  if (!queue.length){ drawing = false; return; }
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  // each ribbon is ONE stroke (uniform alpha, no overlap seams);
  // the piece composes itself a few ribbons per frame
  const per = reduceMotion ? queue.length : 2;
  for (let k=0;k<per && queue.length;k++){
    const rib = queue.shift();
    ctx.beginPath();
    rib.pts.forEach((p,i) => i ? ctx.lineTo(p.x,p.y) : ctx.moveTo(p.x,p.y));
    ctx.strokeStyle = `rgba(255,255,255,${rib.o})`;
    ctx.lineWidth = rib.w;
    ctx.stroke();
  }
  if (queue.length) requestAnimationFrame(step);
  else drawing = false;
}

function restart(origin){
  reseedNoise();
  noiseScale = 0.0009 * (+document.getElementById("rScale").value);
  ow = Math.ceil(W/OCC); oh = Math.ceil(H/OCC);
  occ = new Uint8Array(ow*oh);
  ctx.fillStyle = "#0033ff";
  ctx.fillRect(0,0,W,H);
  buildRibbons(+document.getElementById("rLines").value, origin);
  if (!drawing){ drawing = true; requestAnimationFrame(step); }
}

document.getElementById("btnNew").addEventListener("click", () => { seed = (Math.random()*1e9)|0; restart(); });
document.getElementById("rLines").addEventListener("change", () => restart());
document.getElementById("rScale").addEventListener("change", () => restart());
canvas.addEventListener("pointerdown", e => { seed = (Math.random()*1e9)|0; restart({x:e.clientX, y:e.clientY}); });

document.getElementById("btnSave").addEventListener("click", () => {
  const a = document.createElement("a");
  a.download = "flow-field.png";
  a.href = canvas.toDataURL("image/png");
  a.click();
});

seed = (Math.random()*1e9)|0;
resize();
})();
</script>
</body>
</html>
