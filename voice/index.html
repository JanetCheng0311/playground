<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Type a line and generate robotic or instrument speech blips with emotion. Download as WAV for your game.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230033ff'/%3E%3Cg fill='white'%3E%3Crect x='14' y='26' width='5' height='12'/%3E%3Crect x='23' y='18' width='5' height='28'/%3E%3Crect x='32' y='22' width='5' height='20'/%3E%3Crect x='41' y='14' width='5' height='36'/%3E%3C/g%3E%3C/svg%3E">
<title>Voice — Playground</title>
<style>
  :root{ --blue:#0033ff; --white:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--blue);color:var(--white);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    min-height:100dvh;display:flex;flex-direction:column;
  }
  header{
    display:flex;align-items:baseline;gap:24px;
    padding:22px clamp(20px,4vw,40px);font-size:14px;font-weight:500;flex:0 0 auto;
  }
  header a{color:var(--white);text-decoration:none;padding:2px 0;border-bottom:1px solid transparent;transition:border-color .15s}
  header a:hover{border-bottom-color:var(--white)}
  header .title{font-weight:600;margin-right:auto}
  header .title em{font-style:normal;opacity:.6;font-weight:400;margin-left:10px}

  main{
    flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;gap:34px;
    padding:0 clamp(20px,6vw,80px) 8vh;max-width:920px;width:100%;margin:0 auto;
  }
  .line input{
    width:100%;background:none;border:none;border-bottom:2px solid rgba(255,255,255,.5);
    color:var(--white);font:inherit;font-size:clamp(24px,4.4vw,46px);font-weight:600;
    letter-spacing:-.02em;padding:8px 2px 14px;outline:none;
  }
  .line input::placeholder{color:rgba(255,255,255,.45)}
  .line input:focus{border-bottom-color:var(--white)}

  .group{display:flex;flex-direction:column;gap:10px}
  .group .lbl{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.6}
  .chips{display:flex;gap:18px;flex-wrap:wrap}
  .chips button{
    font:inherit;font-size:15px;font-weight:500;color:var(--white);
    background:none;border:none;cursor:pointer;padding:3px 0;
    opacity:.5;border-bottom:2px solid transparent;
    transition:opacity .15s,border-color .15s;
  }
  .chips button:hover{opacity:.85}
  .chips button.on{opacity:1;border-bottom-color:var(--white)}

  .actions{display:flex;align-items:center;gap:22px;flex-wrap:wrap;margin-top:4px}
  .actions button{
    font:inherit;font-weight:600;cursor:pointer;border-radius:999px;
    transition:transform .12s ease, background .15s ease;
  }
  #play{font-size:17px;padding:13px 30px;background:var(--white);color:var(--blue);border:none}
  #play:hover{transform:translateY(-2px)}
  #play:active{transform:translateY(0) scale(.97)}
  #dl,#mp3{font-size:15px;padding:12px 22px;background:none;color:var(--white);border:2px solid var(--white)}
  #dl:hover,#mp3:hover{background:rgba(255,255,255,.12)}
  #mp3[disabled]{opacity:.5;cursor:default}
  .dur{font-size:13px;opacity:.65;font-variant-numeric:tabular-nums}
  .batch{margin-top:14px;gap:8px}
  .batch textarea{width:100%;max-width:640px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.35);
    border-radius:12px;color:var(--white);font:inherit;font-size:15px;padding:12px 14px;resize:vertical;outline:none;line-height:1.5}
  .batch textarea::placeholder{color:rgba(255,255,255,.45)}
  .batch textarea:focus{border-color:var(--white)}
  #batchBtn{align-self:flex-start;font:inherit;font-weight:600;font-size:15px;cursor:pointer;border-radius:999px;
    padding:12px 22px;background:none;color:var(--white);border:2px solid var(--white)}
  #batchBtn:hover{background:rgba(255,255,255,.12)}
  #batchBtn[disabled]{opacity:.5;cursor:default}
  @media (max-width:640px){ header{gap:16px;padding:16px} }
</style>
</head>
<body>
<header>
  <span class="title">Voice<em>robotic &amp; instrument speech</em></span>
  <a href="../">playground</a>
</header>
<main>
  <div class="group">
    <span class="lbl">type your line here</span>
    <div class="line">
      <input id="text" type="text" value="hello traveler" maxlength="120" placeholder="type what your character says…" autocomplete="off">
    </div>
  </div>
  <div class="group">
    <span class="lbl">emotion</span>
    <div class="chips" id="emos"></div>
  </div>
  <div class="group">
    <span class="lbl">voice</span>
    <div class="chips" id="voices"></div>
  </div>
  <div class="actions">
    <button id="play">▶ play</button>
    <button id="mp3">download mp3</button>
    <button id="dl">download wav</button>
    <span class="dur" id="dur"></span>
  </div>
  <div class="group batch">
    <span class="lbl">batch — one quote per line</span>
    <textarea id="batch" rows="4" placeholder="line one of dialogue&#10;line two&#10;line three"></textarea>
    <button id="batchBtn">download all (zip of mp3)</button>
  </div>
</main>
<script>
(() => {
"use strict";
const $=id=>document.getElementById(id);

let actx=null, master=null;
function audio(){
  if(actx){ if(actx.state==="suspended")actx.resume(); return actx; }
  try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; }
  master=actx.createGain(); master.gain.value=0.4; master.connect(actx.destination);
  return actx;
}

// major-pentatonic step pool (semitones) so blips stay musical
const PENT=[0,2,4,7,9,12,14,16,19,21];
function noteFor(ch){
  const c=ch.toLowerCase().charCodeAt(0);
  return PENT[(c*7)%PENT.length];
}

// emotion: base pitch (Hz), tempo, gain, and a pitch contour over the line (semitones vs progress p)
const EMO={
  neutral:{base:210,tempo:1.0,gain:0.5,contour:p=>0},
  happy:  {base:300,tempo:1.08,gain:0.55,vib:0.4,contour:p=>2+Math.sin(p*Math.PI*4)*2},
  sad:    {base:150,tempo:0.78,gain:0.42,contour:p=>-2-p*4},
  angry:  {base:185,tempo:1.32,gain:0.7,harsh:true,contour:p=>1+Math.sin(p*Math.PI*6)*0.6},
  curious:{base:235,tempo:0.95,gain:0.5,contour:p=>p>0.65?(p-0.65)/0.35*6:0},
  robotic:{base:140,tempo:1.0,gain:0.5,mono:true,contour:p=>0},
};
// each voice = waveform + pitch multiplier + optional extras (detune beat, harmonic, noise, long tail)
const VOICES={
  robot:     {wave:"square",   mult:1.0},
  instrument:{wave:"triangle", mult:1.0},
  chiptune:  {wave:"square",   mult:2.0, short:true},                 // bright, an octave up
  deep:      {wave:"sawtooth", mult:0.5},                             // low monster
  squeak:    {wave:"square",   mult:2.6, short:true, gain:0.8},       // tiny & high
  bell:      {wave:"sine",     mult:1.5, ring:true, decay:2.4, gain:0.9}, // glassy with harmonic tail
  alien:     {wave:"sawtooth", mult:1.2, second:true, detune:24},     // detuned wobble
  buzz:      {wave:"sawtooth", mult:1.0, noise:true, gain:0.85},      // gritty static
};
let emotion="neutral", voice="robot";

function build(textArg){
  const text=(textArg!=null?textArg:$("text").value)||"hello";
  const E=EMO[emotion], V=VOICES[voice];
  // emotion can roughen the tone for the simple voices
  const wave = (emotion==="angry" && (voice==="robot"||voice==="instrument")) ? "sawtooth" : V.wave;
  const per=0.078/E.tempo*(V.short?0.85:1);     // seconds per character ≈ speaking pace
  const chars=[...text];
  const n=Math.max(1,chars.length);
  const evs=[]; let t=0;
  chars.forEach((ch,i)=>{
    const p=i/n;
    if(/\s/.test(ch)){ t+=per*1.3; return; }
    if(/[.,!?;:]/.test(ch)){ t+=per*1.7; return; }
    const vowel=/[aeiou]/i.test(ch);
    const note = E.mono ? 0 : noteFor(ch);
    let freq = E.base*V.mult*Math.pow(2,(note+E.contour(p))/12);
    if(E.vib) freq *= 1+Math.sin(i*1.4)*0.025*E.vib;
    const dur = per*(vowel?1.5:1)*0.88;
    evs.push({t,freq,dur,wave,gain:E.gain*(V.gain||1)});
    t += per*(vowel?1.45:1);
  });
  return {events:evs,total:t+0.18*(V.decay||1),V};
}

function getNoise(ctx){
  if(!ctx._nb){ const len=ctx.sampleRate*0.3|0, b=ctx.createBuffer(1,len,ctx.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=Math.random()*2-1; ctx._nb=b; }
  return ctx._nb;
}
function schedule(ctx,dest,t0,data){
  const V=data.V;
  const oscN=1+(V.second?1:0)+(V.ring?1:0);
  data.events.forEach(ev=>{
    const s=t0+ev.t, e=s+ev.dur*(V.decay||1);
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.0001,s);
    g.gain.exponentialRampToValueAtTime(ev.gain/Math.sqrt(oscN),s+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,e);
    g.connect(dest);
    const osc=(ratio,detune,type)=>{ const o=ctx.createOscillator(); o.type=type||ev.wave; o.frequency.value=ev.freq*(ratio||1); if(detune)o.detune.value=detune; o.connect(g); o.start(s); o.stop(e+0.02); };
    osc();
    if(V.second) osc(1,V.detune||14);
    if(V.ring)   osc(2,0,"sine");      // octave harmonic -> bell shimmer
    if(V.noise){
      const ns=ctx.createBufferSource(); ns.buffer=getNoise(ctx);
      const nf=ctx.createBiquadFilter(); nf.type="bandpass"; nf.frequency.value=ev.freq*2; nf.Q.value=0.8;
      const ng=ctx.createGain(); ng.gain.setValueAtTime(ev.gain*0.3,s); ng.gain.exponentialRampToValueAtTime(0.0001,s+ev.dur*0.7);
      ns.connect(nf).connect(ng).connect(dest); ns.start(s); ns.stop(s+ev.dur);
    }
  });
}

function play(){
  const a=audio(); if(!a)return;
  const data=build();
  schedule(a,master,a.currentTime+0.04,data);
  showDur(data.total);
}

function showDur(t){ $("dur").textContent=t.toFixed(1)+"s"; }

// ---- WAV export so the clip can be dropped into a game ----
function bufferToWav(buf){
  const sr=buf.sampleRate, d=buf.getChannelData(0), len=d.length;
  const ab=new ArrayBuffer(44+len*2), v=new DataView(ab); let o=0;
  const str=s=>{for(let i=0;i<s.length;i++)v.setUint8(o++,s.charCodeAt(i));};
  const u16=x=>{v.setUint16(o,x,true);o+=2;}, u32=x=>{v.setUint32(o,x,true);o+=4;};
  str("RIFF");u32(36+len*2);str("WAVE");str("fmt ");u32(16);u16(1);u16(1);u32(sr);u32(sr*2);u16(2);u16(16);str("data");u32(len*2);
  for(let i=0;i<len;i++){ const s=Math.max(-1,Math.min(1,d[i])); v.setInt16(o,s<0?s*0x8000:s*0x7fff,true); o+=2; }
  return new Blob([ab],{type:"audio/wav"});
}
const SR=44100;
async function render(textArg){
  const data=build(textArg);
  const off=new OfflineAudioContext(1,Math.ceil(SR*data.total),SR);
  const m=off.createGain(); m.gain.value=0.7; m.connect(off.destination);
  schedule(off,m,0,data);
  showDur(data.total);
  return off.startRendering();
}
function slug(s){ return (s||"voice").trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,24)||"voice"; }
function saveBlob(blob,name){
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}
function save(blob,ext){ saveBlob(blob,`${slug($("text").value)}-${emotion}.${ext}`); }
async function download(){ save(bufferToWav(await render()),"wav"); }

function bufToMp3(buf){
  const ch=buf.getChannelData(0), i16=new Int16Array(ch.length);
  for(let i=0;i<ch.length;i++){ const s=Math.max(-1,Math.min(1,ch[i])); i16[i]=s<0?s*0x8000:s*0x7fff; }
  const enc=new lamejs.Mp3Encoder(1,SR,128), block=1152, out=[];
  for(let i=0;i<i16.length;i+=block){ const c=i16.subarray(i,i+block); const m=enc.encodeBuffer(c); if(m.length)out.push(m); }
  const fin=enc.flush(); if(fin.length)out.push(fin);
  let len=0; out.forEach(a=>len+=a.length); const all=new Uint8Array(len); let o=0; out.forEach(a=>{all.set(a,o);o+=a.length;});
  return all;
}

// ---- minimal ZIP (store, no compression) so many clips download as one file ----
function crc32(b){ let c=~0; for(let i=0;i<b.length;i++){ c^=b[i]; for(let k=0;k<8;k++) c=(c>>>1)^(0xEDB88320&-(c&1)); } return ~c>>>0; }
function makeZip(files){
  const enc=new TextEncoder(), parts=[]; let off=0; const central=[];
  const le=(n,bytes)=>{ const a=new Uint8Array(bytes); for(let i=0;i<bytes;i++){a[i]=n&255;n=Math.floor(n/256);} return a; };
  const push=a=>{parts.push(a);off+=a.length;};
  files.forEach(f=>{
    const name=enc.encode(f.name), data=f.bytes, crc=crc32(data), lo=off;
    push(le(0x04034b50,4));push(le(20,2));push(le(0,2));push(le(0,2));push(le(0,2));push(le(0,2));
    push(le(crc,4));push(le(data.length,4));push(le(data.length,4));push(le(name.length,2));push(le(0,2));
    push(name);push(data);
    const c=[le(0x02014b50,4),le(20,2),le(20,2),le(0,2),le(0,2),le(0,2),le(0,2),le(crc,4),le(data.length,4),le(data.length,4),le(name.length,2),le(0,2),le(0,2),le(0,2),le(0,2),le(0,4),le(lo,4),name];
    central.push(c);
  });
  const cdOff=off; let cdSize=0;
  central.forEach(c=>c.forEach(a=>{push(a);cdSize+=a.length;}));
  push(le(0x06054b50,4));push(le(0,2));push(le(0,2));push(le(files.length,2));push(le(files.length,2));push(le(cdSize,4));push(le(cdOff,4));push(le(0,2));
  let total=0; parts.forEach(p=>total+=p.length); const out=new Uint8Array(total); let o=0; parts.forEach(p=>{out.set(p,o);o+=p.length;});
  return new Blob([out],{type:"application/zip"});
}
async function downloadBatch(){
  const lines=$("batch").value.split("\n").map(s=>s.trim()).filter(Boolean);
  if(!lines.length){ alert("Type one quote per line in the batch box first."); return; }
  const btn=$("batchBtn"), orig=btn.textContent; btn.disabled=true;
  try{
    await loadLame();
    const files=[], used={};
    for(let i=0;i<lines.length;i++){
      btn.textContent=`encoding ${i+1}/${lines.length}…`;
      const buf=await render(lines[i]);
      let nm=slug(lines[i]); if(used[nm])nm+="-"+i; used[nm]=1;
      files.push({name:`${String(i+1).padStart(2,"0")}_${nm}.mp3`, bytes:bufToMp3(buf)});
    }
    saveBlob(makeZip(files), `voices-${emotion}-${files.length}.zip`);
  }catch(e){ alert("Batch needs a connection to load the MP3 encoder."); }
  finally{ btn.disabled=false; btn.textContent=orig; }
}

// MP3 export: load a small encoder on demand, then encode the rendered PCM
let lamePromise=null;
function loadLame(){
  if(window.lamejs) return Promise.resolve();
  if(!lamePromise) lamePromise=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js";
    s.onload=res; s.onerror=()=>rej(new Error("encoder load failed"));
    document.head.appendChild(s);
  });
  return lamePromise;
}
async function downloadMp3(){
  const btn=$("mp3"); btn.disabled=true; const orig=btn.textContent; btn.textContent="encoding…";
  try{
    await loadLame();
    const buf=await render();
    const ch=buf.getChannelData(0), i16=new Int16Array(ch.length);
    for(let i=0;i<ch.length;i++){ const s=Math.max(-1,Math.min(1,ch[i])); i16[i]=s<0?s*0x8000:s*0x7fff; }
    const enc=new lamejs.Mp3Encoder(1,SR,128), block=1152, out=[];
    for(let i=0;i<i16.length;i+=block){ const c=i16.subarray(i,i+block); const m=enc.encodeBuffer(c); if(m.length)out.push(m); }
    const fin=enc.flush(); if(fin.length)out.push(fin);
    save(new Blob(out,{type:"audio/mp3"}),"mp3");
  }catch(e){
    alert("Couldn't load the MP3 encoder (need a connection). The WAV download still works offline.");
  }finally{ btn.disabled=false; btn.textContent=orig; }
}

// ---- chip rows ----
function chipRow(el, names, current, onPick){
  names.forEach(name=>{
    const b=document.createElement("button");
    b.textContent=name; if(name===current)b.classList.add("on");
    b.addEventListener("click",()=>{ [...el.children].forEach(c=>c.classList.remove("on")); b.classList.add("on"); onPick(name); });
    el.appendChild(b);
  });
}
chipRow($("emos"),["neutral","happy","sad","angry","curious","robotic"],emotion,v=>{emotion=v;play();});
chipRow($("voices"),["robot","instrument","chiptune","deep","squeak","bell","alien","buzz"],voice,v=>{voice=v;play();});

$("play").addEventListener("click",play);
$("batchBtn").addEventListener("click",downloadBatch);
$("mp3").addEventListener("click",downloadMp3);
$("dl").addEventListener("click",download);
$("text").addEventListener("keydown",e=>{ if(e.key==="Enter")play(); });

showDur(build().total);
})();
</script>
</body>
</html>
