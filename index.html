<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A collection of interactive creative coding toys: bubbles, flow fields, and more.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230033ff'/%3E%3Ccircle cx='32' cy='32' r='17' fill='none' stroke='white' stroke-width='5'/%3E%3C/svg%3E">
<title>Playground — creative coding</title>
<style>
  :root{
    --blue:#0033ff;
    --white:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--blue);
    color:var(--white);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    min-height:100dvh;
    overflow:hidden;
  }

  main{
    min-height:100dvh;
    display:flex;flex-direction:column;
    justify-content:space-between;
    padding:clamp(28px,5vh,56px) clamp(24px,6vw,80px);
  }

  h1{
    font-size:clamp(15px,1.6vw,18px);
    font-weight:600;
    letter-spacing:-.01em;
  }

  .middle{
    display:flex;flex-direction:column;gap:6px;
  }
  .middle p{
    font-size:clamp(13px,1.3vw,15px);
    font-weight:400;
    opacity:.75;
    margin-bottom:26px;
  }
  nav{display:flex;flex-direction:column}
  nav a{
    text-decoration:none;color:var(--white);
    display:flex;align-items:baseline;gap:clamp(14px,2.5vw,28px);
    padding:clamp(10px,2vh,20px) 0;
    border-top:1px solid rgba(255,255,255,.35);
    transition:opacity .15s ease;
  }
  nav a:last-child{border-bottom:1px solid rgba(255,255,255,.35)}
  nav a b{
    font-size:clamp(34px,6vw,72px);
    font-weight:600;
    letter-spacing:-.035em;
    line-height:1.05;
    transition:transform .25s cubic-bezier(.16,1,.3,1);
  }
  nav a span{
    font-size:clamp(12px,1.2vw,14px);
    opacity:.7;
  }
  nav a .arrow{
    margin-left:auto;
    font-size:clamp(20px,2.6vw,30px);
    opacity:0;
    transform:translateX(-10px);
    transition:opacity .2s ease, transform .25s cubic-bezier(.16,1,.3,1);
  }
  nav a:hover b{transform:translateX(10px)}
  nav a:hover .arrow{opacity:1;transform:translateX(0)}
  nav a:focus-visible{outline:2px solid var(--white);outline-offset:6px}

  footer{
    font-size:12px;
    font-weight:500;
    opacity:.6;
  }

  @media (prefers-reduced-motion: reduce){
    nav a b, nav a .arrow{transition:none}
  }
</style>
</head>
<body>
<main>
  <h1>Playground</h1>

  <div class="middle">
    <p>Interactive toys made with code. Pick one.</p>
    <nav aria-label="Generators">
      <a href="fireworks/">
        <b>Fireworks</b>
        <span>launch pixel fireworks</span>
        <span class="arrow" aria-hidden="true">&#8594;</span>
      </a>
      <a href="flow/">
        <b>Flow</b>
        <span>generative line fields</span>
        <span class="arrow" aria-hidden="true">&#8594;</span>
      </a>
      <a href="kaleidoscope/">
        <b>Kaleidoscope</b>
        <span>draw a pixel mandala</span>
        <span class="arrow" aria-hidden="true">&#8594;</span>
      </a>
      <a href="asmr/">
        <b>ASMR</b>
        <span>tap objects for sounds</span>
        <span class="arrow" aria-hidden="true">&#8594;</span>
      </a>
      <a href="voice/">
        <b>Voice</b>
        <span>robotic speech for games</span>
        <span class="arrow" aria-hidden="true">&#8594;</span>
      </a>
    </nav>
  </div>

  <footer>made by Janet</footer>
</main>
</body>
</html>
