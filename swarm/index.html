<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="A living swarm of particles that flock together and follow your touch.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%2306080f'/%3E%3Cg fill='%2362d0ff'%3E%3Ccircle cx='30' cy='30' r='3'/%3E%3Ccircle cx='40' cy='26' r='2.5'/%3E%3Ccircle cx='22' cy='36' r='2.5'/%3E%3Ccircle cx='38' cy='40' r='2.5'/%3E%3Ccircle cx='48' cy='34' r='2.5'/%3E%3C/g%3E%3C/svg%3E">
<title>Swarm — Playground</title>
<style>
  :root{ --white:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:#06080f;color:var(--white);font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;touch-action:none}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair}
  header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:baseline;gap:24px;
    padding:22px clamp(20px,4vw,40px);pointer-events:none;font-size:14px;font-weight:500}
  header a,header button{pointer-events:auto;font:inherit;color:var(--white);background:none;border:none;cursor:pointer;
    text-decoration:none;padding:2px 0;border-bottom:1px solid transparent;transition:border-color .15s}
  header a:hover,header button:hover{border-bottom-color:var(--white)}
  header .title{font-weight:600;margin-right:auto;pointer-events:none}
  header .title em{font-style:normal;opacity:.55;font-weight:400;margin-left:10px}
  header .spacer{flex:0 0 8px}
  header #mode.on{color:#62d0ff;border-bottom-color:#62d0ff}
  .panel{position:fixed;left:clamp(20px,4vw,40px);bottom:22px;z-index:10;display:flex;flex-direction:column;gap:9px;font-size:13px;font-weight:500}
  .panel label{display:flex;align-items:center;gap:12px}
  .panel label span{width:46px;opacity:.7}
  input[type=range]{-webkit-appearance:none;appearance:none;width:150px;height:22px;background:transparent;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:1px;background:rgba(255,255,255,.5)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;background:var(--white);margin-top:-6px}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--white);border:none}
  .hint{position:fixed;right:clamp(20px,4vw,40px);bottom:22px;z-index:10;font-size:12px;opacity:.5;max-width:20ch;text-align:right;line-height:1.6}
  @media (max-width:640px){.hint{display:none}header{gap:16px;padding:16px}}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<header>
  <span class="title">Swarm<em>flocking particles</em></span>
  <button id="mode" class="on">attract</button>
  <button id="theme">color</button>
  <span class="spacer"></span>
  <a href="../">playground</a>
</header>
<div class="panel">
  <label><span>count</span><input type="range" id="rN" min="60" max="600" value="260"></label>
  <label><span>calm</span><input type="range" id="rC" min="0" max="100" value="55"></label>
</div>
<p class="hint">move to lead the swarm, tap to scatter</p>
<script>
(() => {
"use strict";
const canvas=document.getElementById("stage"), ctx=canvas.getContext("2d");
const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
let W,H;
function resize(){ W=innerWidth;H=innerHeight;canvas.width=W;canvas.height=H; }
addEventListener("resize",resize); resize();

const THEMES=[ [190,55], [320,40], [140,50], [40,300] ]; // [hueStart, span]
let theme=0, repel=false, calm=0.55;
const $=id=>document.getElementById(id);
let mx=W/2, my=H/2, lead=false;

let boids=[];
function makeBoids(nn){
  boids=[];
  for(let i=0;i<nn;i++) boids.push({x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2, h:Math.random()});
}
makeBoids(260);

function step(){
  const max=2.4 + (1-calm)*2.2;       // speed
  const per=46, per2=per*per;
  for(let i=0;i<boids.length;i++){
    const b=boids[i];
    let ax=0,ay=0, cxs=0,cys=0, axs=0,ays=0, sxs=0,sys=0, near=0;
    for(let j=0;j<boids.length;j+=1){
      if(j===i)continue;
      const o=boids[j], dx=o.x-b.x, dy=o.y-b.y, d2=dx*dx+dy*dy;
      if(d2<per2 && d2>0.01){ near++; cxs+=o.x;cys+=o.y; axs+=o.vx;ays+=o.vy;
        const inv=1/d2; sxs-=dx*inv*120; sys-=dy*inv*120; }
    }
    if(near){ ax+=((cxs/near-b.x))*0.0009; ay+=((cys/near-b.y))*0.0009;     // cohesion
      ax+=((axs/near-b.vx))*0.04; ay+=((ays/near-b.vy))*0.04;               // alignment
      ax+=sxs*0.01; ay+=sys*0.01; }                                        // separation
    // cursor influence
    const dx=mx-b.x, dy=my-b.y, dd=Math.hypot(dx,dy)||1;
    if(lead){ const f=(repel?-1:1)*0.06; ax+=dx/dd*f; ay+=dy/dd*f; }
    b.vx+=ax; b.vy+=ay;
    const sp=Math.hypot(b.vx,b.vy); if(sp>max){ b.vx=b.vx/sp*max; b.vy=b.vy/sp*max; }
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<0)b.x+=W; if(b.x>W)b.x-=W; if(b.y<0)b.y+=H; if(b.y>H)b.y-=H;
  }
}
function loop(){
  ctx.fillStyle="rgba(6,8,15,0.16)"; ctx.fillRect(0,0,W,H);   // motion trails
  if(!reduce) step();
  const T=THEMES[theme];
  for(const b of boids){
    const hue=(T[0]+b.h*T[1])%360;
    ctx.fillStyle=`hsl(${hue},85%,65%)`;
    const a=Math.atan2(b.vy,b.vx);
    ctx.beginPath(); ctx.moveTo(b.x+Math.cos(a)*5,b.y+Math.sin(a)*5);
    ctx.lineTo(b.x+Math.cos(a+2.5)*3.5,b.y+Math.sin(a+2.5)*3.5);
    ctx.lineTo(b.x+Math.cos(a-2.5)*3.5,b.y+Math.sin(a-2.5)*3.5);
    ctx.closePath(); ctx.fill();
  }
  requestAnimationFrame(loop);
}
addEventListener("pointermove",e=>{mx=e.clientX;my=e.clientY;lead=true;});
canvas.addEventListener("pointerdown",e=>{ // scatter burst
  for(const b of boids){ const dx=b.x-e.clientX, dy=b.y-e.clientY, d=Math.hypot(dx,dy)||1; b.vx+=dx/d*6; b.vy+=dy/d*6; }
});
$("rN").addEventListener("input",e=>makeBoids(+e.target.value));
$("rC").addEventListener("input",e=>calm=+e.target.value/100);
$("mode").addEventListener("click",e=>{repel=!repel;e.currentTarget.textContent=repel?"repel":"attract";e.currentTarget.classList.toggle("on",!repel);});
$("theme").addEventListener("click",()=>theme=(theme+1)%THEMES.length);
calm=+$("rC").value/100;
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
