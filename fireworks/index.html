<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="A pixel firework generator with different burst styles and sound. Tap to launch glowing pixel fireworks into the night.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23060608'/%3E%3Cg fill='white'%3E%3Crect x='30' y='10' width='4' height='4'/%3E%3Crect x='44' y='20' width='4' height='4'/%3E%3Crect x='16' y='22' width='4' height='4'/%3E%3Crect x='38' y='38' width='4' height='4'/%3E%3Crect x='22' y='40' width='4' height='4'/%3E%3Crect x='30' y='26' width='4' height='4'/%3E%3C/g%3E%3C/svg%3E">
<title>Fireworks — Playground</title>
<style>
  :root{ --bg:#060608; --white:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);color:var(--white);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;
    touch-action:none;
  }
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair}

  header{
    position:fixed;top:0;left:0;right:0;z-index:10;
    display:flex;align-items:baseline;gap:24px;
    padding:22px clamp(20px,4vw,40px);
    pointer-events:none;font-size:14px;font-weight:500;
  }
  header a, header button{
    pointer-events:auto;font:inherit;color:var(--white);
    background:none;border:none;cursor:pointer;text-decoration:none;padding:2px 0;
    border-bottom:1px solid transparent;
    transition:border-color .15s ease, opacity .15s ease;
  }
  header a:hover, header button:hover{border-bottom-color:var(--white)}
  header a:focus-visible, header button:focus-visible{outline:2px solid var(--white);outline-offset:4px}
  header .title{font-weight:600;margin-right:auto;pointer-events:none}
  header .title em{font-style:normal;opacity:.55;font-weight:400;margin-left:10px}
  header .spacer{flex:0 0 8px}

  .panel{
    position:fixed;left:clamp(20px,4vw,40px);bottom:22px;z-index:10;
    display:flex;flex-direction:column;gap:13px;font-size:13px;font-weight:500;
  }
  .styles{display:flex;gap:14px;flex-wrap:wrap;max-width:340px}
  .styles button{
    font:inherit;font-size:13px;font-weight:500;color:var(--white);
    background:none;border:none;cursor:pointer;padding:2px 0;
    opacity:.45;border-bottom:1px solid transparent;
    transition:opacity .15s ease, border-color .15s ease;
  }
  .styles button:hover{opacity:.8}
  .styles button.on{opacity:1;border-bottom-color:var(--white)}

  .sliders{display:flex;flex-direction:column;gap:9px}
  .sliders label{display:flex;align-items:center;gap:12px}
  .sliders label span{width:46px;opacity:.7}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:140px;height:22px;background:transparent;cursor:pointer;
  }
  input[type=range]::-webkit-slider-runnable-track{height:1px;background:rgba(255,255,255,.5)}
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;
    background:var(--white);margin-top:-6px;
  }
  input[type=range]::-moz-range-track{height:1px;background:rgba(255,255,255,.5)}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--white);border:none}

  .toggles{display:flex;gap:18px}
  .toggles button{
    font:inherit;font-size:13px;font-weight:500;color:var(--white);
    background:none;border:none;cursor:pointer;padding:2px 0;
    opacity:.5;border-bottom:1px solid transparent;
    transition:opacity .15s ease, border-color .15s ease;
  }
  .toggles button:hover{opacity:.8}
  .toggles button.on{opacity:1;border-bottom-color:var(--white)}

  .hint{
    position:fixed;right:clamp(20px,4vw,40px);bottom:22px;z-index:10;
    font-size:12px;font-weight:400;opacity:.5;max-width:22ch;text-align:right;line-height:1.6;
  }
  @media (max-width:640px){
    .hint{display:none}
    header{gap:16px;padding:16px}
    .panel{bottom:16px;left:16px}
    .styles{max-width:240px}
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<header>
  <span class="title">Fireworks<em>pixel firework generator</em></span>
  <button id="btnLaunch">launch</button>
  <button id="btnClear">clear</button>
  <button id="btnSave">save png</button>
  <span class="spacer"></span>
  <a href="../">playground</a>
</header>

<div class="panel">
  <div class="styles" id="styles" role="group" aria-label="Firework style"></div>
  <div class="sliders">
    <label><span>burst</span><input type="range" id="rBurst" min="40" max="600" value="240"></label>
    <label><span>gravity</span><input type="range" id="rGrav" min="0" max="100" value="32"></label>
    <label><span>trails</span><input type="range" id="rTrail" min="2" max="40" value="12"></label>
  </div>
  <div class="toggles">
    <button id="tAuto" aria-pressed="true" class="on">auto</button>
    <button id="tRainbow" aria-pressed="false">rainbow</button>
    <button id="tSound" aria-pressed="true" class="on">sound</button>
  </div>
</div>

<p class="hint">tap the sky to launch a firework</p>

<script>
(() => {
"use strict";
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
const DPR = Math.min(devicePixelRatio || 1, 2);
const TWO_PI = Math.PI*2;
let W = 0, H = 0;

function resize(){
  W = innerWidth; H = innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle = "#060608"; ctx.fillRect(0,0,W,H);
}
addEventListener("resize", resize);
resize();

const rnd = (a=1,b) => b===undefined ? Math.random()*a : a + Math.random()*(b-a);

/* ---------------- settings ---------------- */
const set = { burst:240, grav:0.09, trail:0.12, auto:true, rainbow:false, sound:true, style:"random" };

/* ---------------- firework styles ---------------- */
const STYLES = {
  peony:   { count:1.0, spread:"sphere", speed:[2.2,4.2], decay:[0.006,0.016], gf:1.0,  drag:0.985, big:0.15, flick:0.4,  snd:{lp:1400,dur:0.55,thump:80} },
  ring:    { count:0.8, spread:"ring",   speed:[3.4,3.8], decay:[0.006,0.012], gf:0.85, drag:0.99,  big:0.05, flick:0.2,  snd:{lp:2000,dur:0.35,thump:90,vol:0.45} },
  willow:  { count:1.3, spread:"sphere", speed:[1.3,2.5], decay:[0.003,0.006], gf:1.7,  drag:0.995, big:0.05, flick:0.1,  warm:true, snd:{lp:850,dur:0.9,thump:64,vol:0.5} },
  palm:    { count:0.4, spread:"sphere", speed:[2.6,4.0], decay:[0.004,0.009], gf:1.4,  drag:0.99,  big:0.55, flick:0.15, warm:true, snd:{lp:1000,dur:0.75,thump:70} },
  crackle: { count:1.1, spread:"sphere", speed:[1.6,3.2], decay:[0.012,0.03], gf:1.0,  drag:0.96,  big:0.05, flick:0.95, strobe:true, snd:{lp:1300,dur:0.45,thump:84,crackle:true} },
  heart:   { count:1.0, spread:"heart",  speed:[2.6,3.2], decay:[0.005,0.011], gf:1.0,  drag:0.99,  big:0.05, flick:0.2,  hue:342, snd:{lp:1300,dur:0.5,thump:78} },
};
const STYLE_NAMES = Object.keys(STYLES);

/* ---------------- sound (WebAudio) ---------------- */
let actx=null, noiseBuf=null, master=null;
function ensureAudio(){
  if (actx){ if (actx.state==="suspended") actx.resume(); return actx; }
  try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ return null; }
  master = actx.createGain(); master.gain.value = 0.32; master.connect(actx.destination);
  const len = (actx.sampleRate*1)|0;
  noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i=0;i<len;i++) d[i] = Math.random()*2-1;
  return actx;
}
function playLaunch(){
  if (!set.sound) return; const a=ensureAudio(); if (!a) return;
  const t=a.currentTime, o=a.createOscillator(), g=a.createGain();
  o.type="sine";
  o.frequency.setValueAtTime(640, t);
  o.frequency.exponentialRampToValueAtTime(1500, t+0.5);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.04, t+0.05);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.55);
  o.connect(g).connect(master); o.start(t); o.stop(t+0.6);
}
function playBoom(snd){
  if (!set.sound) return; const a=ensureAudio(); if (!a) return;
  const t=a.currentTime, o=snd||{};
  const src=a.createBufferSource(); src.buffer=noiseBuf;
  const lp=a.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=o.lp||1300;
  const g=a.createGain(); const dur=o.dur||0.5;
  g.gain.setValueAtTime(o.vol||0.5, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  src.connect(lp).connect(g).connect(master); src.start(t); src.stop(t+dur);
  const osc=a.createOscillator(), og=a.createGain(); const f=o.thump||80;
  osc.type="sine";
  osc.frequency.setValueAtTime(f, t);
  osc.frequency.exponentialRampToValueAtTime(f*0.6, t+0.2);
  og.gain.setValueAtTime(0.5, t);
  og.gain.exponentialRampToValueAtTime(0.0001, t+0.26);
  osc.connect(og).connect(master); osc.start(t); osc.stop(t+0.3);
  if (o.crackle){
    for (let i=0;i<16;i++){
      const tt=t+rnd(0.06,0.95);
      const cs=a.createBufferSource(); cs.buffer=noiseBuf;
      const hp=a.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=2600;
      const cg=a.createGain();
      cg.gain.setValueAtTime(0.0001, tt);
      cg.gain.exponentialRampToValueAtTime(0.12, tt+0.004);
      cg.gain.exponentialRampToValueAtTime(0.0001, tt+0.05);
      cs.connect(hp).connect(cg).connect(master); cs.start(tt); cs.stop(tt+0.06);
    }
  }
}

/* ---------------- particles ---------------- */
const rockets = [];
const sparks = [];
const MAX_SPARKS = 6500;

const HUES = [0, 18, 45, 120, 190, 215, 280, 320];
function pickHue(){ return HUES[(Math.random()*HUES.length)|0] + rnd(-10,10); }
function resolveStyle(){ return set.style==="random" ? STYLE_NAMES[(Math.random()*STYLE_NAMES.length)|0] : set.style; }

function launch(tx, ty, styleName){
  const targetY = ty != null ? ty : rnd(H*0.12, H*0.5);
  const x = tx != null ? tx : rnd(W*0.15, W*0.85);
  const vy = -Math.sqrt(2 * set.grav * (H - targetY)) - rnd(0, 1.2);
  const hue = set.rainbow ? rnd(0,360) : pickHue();
  rockets.push({ x, y:H, vy, vx:rnd(-0.4,0.4), hue, targetY, style: styleName || resolveStyle() });
  playLaunch();
}

function explode(x, y, hue, styleName){
  const st = STYLES[styleName] || STYLES.peony;
  const n = Math.max(24, Math.round(set.burst * st.count));
  const baseSpeed = rnd(st.speed[0], st.speed[1]);
  for (let i=0;i<n;i++){
    if (sparks.length >= MAX_SPARKS) sparks.shift();
    let vx, vy;
    if (st.spread === "ring"){
      const a=(i/n)*TWO_PI, sp=baseSpeed*(0.95+rnd(0,0.1));
      vx=Math.cos(a)*sp; vy=Math.sin(a)*sp;
    } else if (st.spread === "heart"){
      const tt=(i/n)*TWO_PI, sp=baseSpeed/15*(0.9+rnd(0,0.2));
      const hx=16*Math.pow(Math.sin(tt),3);
      const hy=13*Math.cos(tt)-5*Math.cos(2*tt)-2*Math.cos(3*tt)-Math.cos(4*tt);
      vx=hx*sp; vy=-hy*sp;               // flip so the heart sits upright
    } else {
      const a=rnd(0,TWO_PI), sp=baseSpeed*Math.sqrt(rnd(0.04,1));
      vx=Math.cos(a)*sp; vy=Math.sin(a)*sp;
    }
    let h;
    if (set.rainbow)        h=(hue + i/n*360)%360;
    else if (st.hue!=null)  h=st.hue + rnd(-12,12);
    else if (st.warm)       h=38 + rnd(-12,20);
    else                    h=hue + rnd(-14,14);
    sparks.push({
      x, y, vx, vy, hue:h, light:rnd(55,82),
      life:1, decay:rnd(st.decay[0], st.decay[1]),
      size: Math.random()<st.big ? 3 : 2,
      flick: Math.random()<st.flick, strobe: st.strobe,
      gf: st.gf, drag: st.drag,
    });
  }
  playBoom(st.snd);
}

/* ---------------- loop ---------------- */
let lastAuto = 0;
function frame(t){
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = `rgba(6,6,8,${set.trail})`;
  ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation = "lighter";

  for (let i=rockets.length-1;i>=0;i--){
    const r = rockets[i];
    r.vy += set.grav*0.5; r.x += r.vx; r.y += r.vy;
    ctx.fillStyle = `hsl(${r.hue},90%,82%)`;
    ctx.fillRect(r.x|0, r.y|0, 2, 3);
    if (r.vy >= -0.6 || r.y <= r.targetY){
      explode(r.x, r.y, r.hue, r.style);
      rockets.splice(i,1);
    }
  }

  for (let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    s.vx *= s.drag; s.vy *= s.drag;
    s.vy += set.grav*s.gf;
    s.x += s.vx; s.y += s.vy;
    s.life -= s.decay;
    if (s.life <= 0){ sparks.splice(i,1); continue; }
    let a = s.life;
    if (s.strobe) a = s.life * (Math.random()<0.5 ? 0.12 : 1);
    else if (s.flick) a = s.life * (0.6 + Math.random()*0.4);
    ctx.fillStyle = `hsla(${s.hue},100%,${s.light}%,${a})`;
    ctx.fillRect(s.x|0, s.y|0, s.size, s.size);
  }
  ctx.globalCompositeOperation = "source-over";

  if (set.auto && !reduceMotion && t - lastAuto > rnd(550, 1300)){
    launch();
    if (Math.random() < 0.3) launch();
    lastAuto = t;
  }
  requestAnimationFrame(frame);
}

/* ---------------- style picker ---------------- */
const stylesEl = document.getElementById("styles");
["random", ...STYLE_NAMES].forEach(name => {
  const b = document.createElement("button");
  b.textContent = name;
  if (name === set.style) b.classList.add("on");
  b.addEventListener("click", () => {
    set.style = name;
    [...stylesEl.children].forEach(c => c.classList.remove("on"));
    b.classList.add("on");
  });
  stylesEl.appendChild(b);
});

/* ---------------- controls ---------------- */
const $ = id => document.getElementById(id);
$("rBurst").addEventListener("input", e => set.burst = +e.target.value);
$("rGrav").addEventListener("input", e => set.grav = +e.target.value / 360);
$("rTrail").addEventListener("input", e => set.trail = +e.target.value / 100);
set.grav = +$("rGrav").value / 360;
set.trail = +$("rTrail").value / 100;

function toggle(btn, fn){
  const on = btn.classList.toggle("on");
  btn.setAttribute("aria-pressed", on);
  fn(on);
}
$("tAuto").addEventListener("click", e => toggle(e.currentTarget, v => set.auto = v));
$("tRainbow").addEventListener("click", e => toggle(e.currentTarget, v => set.rainbow = v));
$("tSound").addEventListener("click", e => toggle(e.currentTarget, v => { set.sound = v; if (v) ensureAudio(); }));

$("btnLaunch").addEventListener("click", () => { launch(); if (Math.random()<0.4) launch(); });
$("btnClear").addEventListener("click", () => {
  rockets.length = 0; sparks.length = 0;
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = "#060608"; ctx.fillRect(0,0,W,H);
});
$("btnSave").addEventListener("click", () => {
  const a = document.createElement("a");
  a.download = "fireworks.png"; a.href = canvas.toDataURL("image/png"); a.click();
});

canvas.addEventListener("pointerdown", e => launch(e.clientX, e.clientY));

launch(W*0.35, H*0.32, "peony");
launch(W*0.65, H*0.42, "willow");
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
