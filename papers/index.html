<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Sheets of paper tumbling and rippling through the air on a 3D wind.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23aec6df'/%3E%3Cg fill='%23fff' stroke='%23c4cedd'%3E%3Crect x='10' y='14' width='20' height='26' transform='rotate(-12 20 27)'/%3E%3Crect x='34' y='26' width='18' height='24' transform='rotate(16 43 38)'/%3E%3C/g%3E%3C/svg%3E">
<title>Papers — Playground</title>
<style>
  :root{ --ink:#22303f; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:#aec6df;color:var(--ink);font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;touch-action:none}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair}
  header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:baseline;gap:24px;
    padding:22px clamp(20px,4vw,40px);font-size:14px;font-weight:500}
  header a,header button{font:inherit;color:var(--ink);background:none;border:none;cursor:pointer;
    text-decoration:none;padding:2px 0;border-bottom:1px solid transparent;transition:border-color .15s}
  header a:hover,header button:hover{border-bottom-color:var(--ink)}
  header .title{font-weight:600;margin-right:auto}
  header .title em{font-style:normal;opacity:.6;font-weight:400;margin-left:10px}
  header .spacer{flex:0 0 8px}
  .panel{position:fixed;left:clamp(20px,4vw,40px);bottom:22px;z-index:10;display:flex;flex-direction:column;gap:9px;font-size:13px;font-weight:600;color:var(--ink)}
  .panel label{display:flex;align-items:center;gap:12px}
  .panel label span{width:46px;opacity:.7;font-weight:500}
  input[type=range]{-webkit-appearance:none;appearance:none;width:150px;height:22px;background:transparent;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:2px;background:rgba(34,48,63,.4)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ink);margin-top:-6px}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--ink);border:none}
  .hint{position:fixed;right:clamp(20px,4vw,40px);bottom:22px;z-index:10;font-size:12px;color:var(--ink);opacity:.55;max-width:20ch;text-align:right;line-height:1.6}
  @media (max-width:640px){.hint{display:none}header{gap:16px;padding:16px}}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<header>
  <span class="title">Papers<em>blowing in the wind</em></span>
  <button id="gust">gust</button>
  <button id="theme">color</button>
  <span class="spacer"></span>
  <a href="../">playground</a>
</header>
<div class="panel">
  <label><span>count</span><input type="range" id="rN" min="20" max="160" value="70"></label>
  <label><span>wind</span><input type="range" id="rW" min="10" max="100" value="45"></label>
</div>
<p class="hint">move to push the air, tap for a gust</p>
<script>
(() => {
"use strict";
const canvas=document.getElementById("stage"), ctx=canvas.getContext("2d");
const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
const DPR=Math.min(devicePixelRatio||1,2);
let W,H;
function resize(){ W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener("resize",resize); resize();

const FOCAL=560, ZNEAR=120, ZFAR=900;
const LIGHT=norm([-0.45,-0.5,-0.74]);
function norm(v){ const m=Math.hypot(v[0],v[1],v[2])||1; return [v[0]/m,v[1]/m,v[2]/m]; }
function cross(a,b){ return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
const rand=(a,b)=>a+Math.random()*(b-a);

// ---- sheet rendered as smooth full-width strips bent along one axis ----
const ROWS=18;                            // strips across the bend -> smooth curved page

const THEMES=[
  {bg:["#cfe0f0","#a9c2dc"], cols:["#ffffff","#f6f7f9","#eef0f4"]},        // white paper
  {bg:["#f3e9d6","#e3cda0"], cols:["#e8743b","#e0a93b","#c14b2a","#f0c267"]}, // autumn leaves
  {bg:["#161d2b","#0c1018"], cols:["#ff6f91","#62d0ff","#ffd23b","#9af2c0"]}, // sticky notes (night)
  {bg:["#efe7df","#d8ccbf"], cols:["#cdbfae","#b7a690","#e4dccf"]},        // kraft
];
let theme=0, windK=0.45;
let mx=W/2, my=H/2, gust=0;

let papers=[];
function makePapers(n){ papers=[]; const T=THEMES[theme]; for(let i=0;i<n;i++) papers.push(newPaper(T,true)); }
function newPaper(T,anywhere){
  return {
    x: anywhere ? rand(-W*0.6,W*0.6) : -W*0.7-rand(0,W*0.5),
    baseY: rand(-H*0.55,H*0.55), y:0,
    baseZ: rand(ZNEAR+20,ZFAR-40), z:0,
    w: rand(28,54), h: rand(36,66),
    th: rand(0,6.28), ph: rand(0,6.28),
    spTh:(Math.random()-0.5)*0.016, spPh:(Math.random()-0.5)*0.016,   // gentle tumble
    fy: rand(0.4,0.9), py: rand(0,6.28), bobY: rand(10,28),           // smooth vertical bob
    fz: rand(0.3,0.7), pz: rand(0,6.28), bobZ: rand(14,40),           // smooth depth sway
    drift: rand(0.85,1.25),                                          // along-wind speed factor
    curlPh: rand(0,6.28), curlA: rand(0.12,0.26),                    // ripple amount
    col: T.cols[(Math.random()*T.cols.length)|0],
    _sx:null,_sy:null,
  };
}
makePapers(90);

function step(t){
  const wind=windK*2.6;
  for(const p of papers){
    p.x += wind*p.drift + gust;
    p.baseY += Math.sin(t*0.21+p.py)*0.15;                 // very slow vertical drift
    p.y = p.baseY + Math.sin(t*p.fy+p.py)*p.bobY;          // smooth bob
    p.z = p.baseZ + Math.sin(t*p.fz+p.pz)*p.bobZ;          // smooth sway
    p.th += p.spTh*(0.6+windK);
    p.ph += p.spPh*(0.6+windK);
    p.curlPh += 0.025*(0.5+windK);
    if(p._sx!=null){ const dx=p._sx-mx, dy=p._sy-my, d=Math.hypot(dx,dy); if(d<150){ const f=(150-d)*0.04; p.x+=dx/d*f; p.baseY+=dy/d*f; } }
    if(p.x>W*1.3){ Object.assign(p, newPaper(THEMES[theme],false)); }
  }
  gust*=0.88;
}

function project(x,y,z){ const s=FOCAL/(FOCAL+z); return [W/2+x*s, H/2+y*s, s]; }

// per-row left/right edge buffers (world + screen)
const N1=ROWS+1;
const Lwx=new Float64Array(N1),Lwy=new Float64Array(N1),Lwz=new Float64Array(N1);
const Rwx=new Float64Array(N1),Rwy=new Float64Array(N1),Rwz=new Float64Array(N1);
const Lsx=new Float64Array(N1),Lsy=new Float64Array(N1),Rsx=new Float64Array(N1),Rsy=new Float64Array(N1);
const bands=[];

function tint(hex,f){ const r=parseInt(hex.slice(1,3),16)*f, g=parseInt(hex.slice(3,5),16)*f, b=parseInt(hex.slice(5,7),16)*f;
  return `rgb(${r<0?0:r>255?255:r|0},${g<0?0:g>255?255:g|0},${b<0?0:b>255?255:b|0})`; }

function drawPaper(p){
  const n=[Math.sin(p.ph)*Math.cos(p.th), Math.sin(p.ph)*Math.sin(p.th), Math.cos(p.ph)];
  let uu=norm(cross(n,[0,1,0])); if(!isFinite(uu[0])||(!uu[0]&&!uu[1]&&!uu[2])) uu=[1,0,0];
  const vv=cross(n,uu);
  const A=(p.w+p.h)*p.curlA;                      // bend amplitude (one axis -> smooth page curl)
  for(let r=0;r<N1;r++){
    const v=-1+2*r/ROWS;
    const curl=A*(Math.sin(v*2.1+p.curlPh) + 0.4*Math.sin(v*4.2 - p.curlPh*0.7));
    const bx=v*p.h*vv[0]+curl*n[0], by=v*p.h*vv[1]+curl*n[1], bz=v*p.h*vv[2]+curl*n[2];
    Lwx[r]=p.x-p.w*uu[0]+bx; Lwy[r]=p.y-p.w*uu[1]+by; Lwz[r]=p.z-p.w*uu[2]+bz;
    Rwx[r]=p.x+p.w*uu[0]+bx; Rwy[r]=p.y+p.w*uu[1]+by; Rwz[r]=p.z+p.w*uu[2]+bz;
    let s=FOCAL/(FOCAL+Lwz[r]); Lsx[r]=W/2+Lwx[r]*s; Lsy[r]=H/2+Lwy[r]*s;
    s=FOCAL/(FOCAL+Rwz[r]); Rsx[r]=W/2+Rwx[r]*s; Rsy[r]=H/2+Rwy[r]*s;
  }
  const mid=ROWS>>1; p._sx=(Lsx[mid]+Rsx[mid])/2; p._sy=(Lsy[mid]+Rsy[mid])/2;
  bands.length=0;
  for(let r=0;r<ROWS;r++) bands.push([r,(Lwz[r]+Rwz[r+1])*0.5]);
  bands.sort((a,b)=>b[1]-a[1]);                   // far bands first
  for(const bd of bands){
    const r=bd[0];
    // smooth shading from the band's surface normal (double-sided)
    const e1=[Rwx[r]-Lwx[r],Rwy[r]-Lwy[r],Rwz[r]-Lwz[r]];
    const e2=[Lwx[r+1]-Lwx[r],Lwy[r+1]-Lwy[r],Lwz[r+1]-Lwz[r]];
    const cn=norm(cross(e1,e2));
    const lit=Math.abs(cn[0]*LIGHT[0]+cn[1]*LIGHT[1]+cn[2]*LIGHT[2]);
    const col=tint(p.col,0.46+0.54*lit);
    ctx.beginPath();
    ctx.moveTo(Lsx[r],Lsy[r]); ctx.lineTo(Rsx[r],Rsy[r]); ctx.lineTo(Rsx[r+1],Rsy[r+1]); ctx.lineTo(Lsx[r+1],Lsy[r+1]); ctx.closePath();
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=0.8; ctx.stroke();   // same-color seam seal -> seamless
  }
}

let last=0;
function draw(now){
  const t=now*0.001;
  const T=THEMES[theme];
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,T.bg[0]); g.addColorStop(1,T.bg[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  if(!reduce) step(t);
  papers.sort((a,b)=>b.z-a.z);
  for(const p of papers) drawPaper(p);
  requestAnimationFrame(draw);
}

addEventListener("pointermove",e=>{mx=e.clientX;my=e.clientY;});
canvas.addEventListener("pointerdown",()=>{ gust=12; });
const $=id=>document.getElementById(id);
$("rN").addEventListener("input",e=>makePapers(+e.target.value));
$("rW").addEventListener("input",e=>windK=+e.target.value/100);
$("gust").addEventListener("click",()=>gust=16);
$("theme").addEventListener("click",()=>{ theme=(theme+1)%THEMES.length; const T=THEMES[theme]; papers.forEach(p=>p.col=T.cols[(Math.random()*T.cols.length)|0]); });
windK=+$("rW").value/100;
requestAnimationFrame(draw);
})();
</script>
</body>
</html>
