<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="A little isometric farm — tap to till, plant, water and harvest crops in real time.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230033ff'/%3E%3Cpath d='M32 18 L52 30 L32 42 L12 30 Z' fill='%237ec850'/%3E%3Cpath d='M32 26 L40 31 L32 36 L24 31 Z' fill='%239c6b3f'/%3E%3C/svg%3E">
<title>Farm — Playground</title>
<style>
  :root{ --blue:#0033ff; --white:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:var(--blue);color:var(--white);font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;touch-action:none;min-height:100dvh;display:flex;flex-direction:column}
  header{display:flex;align-items:baseline;gap:20px;padding:18px clamp(16px,4vw,40px);font-size:14px;font-weight:500;flex:0 0 auto;flex-wrap:wrap}
  header a,header button{font:inherit;color:var(--white);background:none;border:none;cursor:pointer;text-decoration:none;
    padding:2px 0;border-bottom:1px solid transparent;transition:border-color .15s}
  header a:hover,header button:hover{border-bottom-color:var(--white)}
  header .title{font-weight:600;margin-right:auto}
  header .title em{font-style:normal;opacity:.6;font-weight:400;margin-left:10px}
  header .stat{font-variant-numeric:tabular-nums;font-weight:600}
  header .stat b{font-weight:700}
  header button.off{opacity:.5}
  main{flex:1 1 auto;display:flex;align-items:center;justify-content:center;min-height:0;padding:0 8px}
  canvas{display:block;max-width:100%}
  .panel{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px clamp(12px,4vw,40px) 18px}
  .seeds{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .seeds button{font:inherit;font-size:13px;font-weight:600;color:var(--white);background:rgba(255,255,255,.1);
    border:1.5px solid rgba(255,255,255,.45);border-radius:14px;padding:8px 14px;cursor:pointer;display:flex;flex-direction:column;gap:1px;align-items:center;line-height:1.15;transition:background .12s,transform .1s}
  .seeds button:hover{background:rgba(255,255,255,.2)}
  .seeds button:active{transform:translateY(1px) scale(.98)}
  .seeds button.on{background:var(--white);color:var(--blue);border-color:var(--white)}
  .seeds button small{font-size:10.5px;font-weight:600;opacity:.75}
  .hint{font-size:12px;opacity:.6;text-align:center;max-width:34ch;line-height:1.5}
  .shop{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(0,12,60,.55);backdrop-filter:blur(4px);padding:16px}
  .shop.open{display:flex}
  .shop .card{background:#0a2acc;border:1px solid rgba(255,255,255,.3);border-radius:20px;width:min(440px,100%);max-height:88vh;overflow-y:auto;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.4)}
  .shop h2{font-size:16px;font-weight:700;display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .shop h2 .c{margin-left:auto;font-size:14px;font-variant-numeric:tabular-nums}
  .shop h3{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.6;margin:18px 0 8px}
  .shop .item{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid rgba(255,255,255,.16)}
  .shop .item div{display:flex;flex-direction:column;gap:2px;flex:1}
  .shop .item b{font-size:14px;font-weight:600}
  .shop .item span{font-size:11.5px;opacity:.7}
  .shop .item .sw{width:26px;height:26px;border-radius:7px;flex:0 0 auto;border:1px solid rgba(255,255,255,.4)}
  .shop .item button{font:inherit;font-size:12px;font-weight:700;color:#0a2acc;background:#fff;border:none;border-radius:999px;padding:7px 14px;cursor:pointer;min-width:58px}
  .shop .item button[disabled]{opacity:.4;cursor:default}
  .shop .close{margin-top:18px;width:100%;font:inherit;font-weight:700;color:#fff;background:none;border:1.5px solid rgba(255,255,255,.5);border-radius:999px;padding:11px;cursor:pointer}
  @media (max-width:640px){header{gap:12px;padding:14px}}
</style>
</head>
<body>
<header>
  <span class="title">Farm<em>tap to grow</em></span>
  <span class="stat">coins <b id="coins">0</b></span>
  <button id="shopBtn">shop</button>
  <button id="snd">sound</button>
  <button id="new">new farm</button>
  <a href="../">playground</a>
</header>
<main><canvas id="stage"></canvas></main>
<div class="shop" id="shop">
  <div class="card">
    <h2>Shop <span class="c">coins <b id="shopCoins">0</b></span></h2>
    <h3>skills</h3><div id="upList"></div>
    <h3>field skins</h3><div id="skinList"></div>
    <button class="close" id="shopClose">close</button>
  </div>
</div>
<div class="panel">
  <div class="seeds" id="seeds"></div>
  <p class="hint">tap grass to till · tap soil to plant the chosen seed · tap a sprout to water it (grows faster) · tap a glowing crop to harvest</p>
</div>
<script>
(() => {
"use strict";
const canvas=document.getElementById("stage"), ctx=canvas.getContext("2d");
const DPR=Math.min(devicePixelRatio||1,2);
const N=7, TW=64, TH=32, DZ=12;
let W,H,ox,oy,scale=1, hover=-1;

const CROPS={
  carrot:{name:"carrot",cost:4, sell:9,  dur:5,  c:"#ff8a3d", leaf:"#3fae5a"},
  wheat: {name:"wheat", cost:8, sell:20, dur:9,  c:"#f4d35e", leaf:"#9bc34a"},
  pumpkin:{name:"pumpkin",cost:18,sell:55, dur:16, c:"#e8702a", leaf:"#3f9d54"},
};
const CKEYS=Object.keys(CROPS);

const SKINS={
  meadow:{name:"Meadow", cost:0,   grass:"#7ec850", soil:"#9c6b3f"},
  desert:{name:"Desert", cost:50,  grass:"#d8c27a", soil:"#b98a4e"},
  midnight:{name:"Midnight",cost:80,grass:"#356b53", soil:"#3b2b1d"},
  tundra:{name:"Tundra", cost:90,  grass:"#bcd3d8", soil:"#8a9aa0"},
  sakura:{name:"Sakura", cost:130, grass:"#efb6cf", soil:"#b07a8a"},
};
const SKKEYS=Object.keys(SKINS);
const UPGRADES=[
  {key:"fert", name:"Fertilizer", desc:"crops grow 25% faster per level", max:5, cost:l=>30*(l+1)},
  {key:"rich", name:"Rich soil",  desc:"crops sell for 20% more per level", max:5, cost:l=>40*(l+1)},
  {key:"sprinkler",name:"Sprinkler",desc:"auto-waters every crop, no tapping", max:1, cost:l=>140},
];

let grid, coins, seed="carrot", skills, skinsOwned, skin;
const fx=[];                      // floating texts / particles
const sprinklerOn=()=>skills.sprinkler>0;

function reset(){ grid=Array.from({length:N*N},()=>({state:"grass",crop:null})); coins=25; seed="carrot";
  skills={fert:0,rich:0,sprinkler:0}; skinsOwned=["meadow"]; skin="meadow"; save(); syncUI(); }
function load(){ try{ const s=JSON.parse(localStorage.getItem("farm2")); if(s&&s.grid&&s.grid.length===N*N){
    grid=s.grid; coins=s.coins; skills=Object.assign({fert:0,rich:0,sprinkler:0},s.skills||{}); skinsOwned=s.skinsOwned||["meadow"]; skin=s.skin||"meadow"; return true; } }catch(e){} return false; }
function save(){ localStorage.setItem("farm2", JSON.stringify({grid,coins,skills,skinsOwned,skin})); }
function syncUI(){ document.getElementById("coins").textContent=coins; }

function resize(){
  const availW=Math.min(window.innerWidth-16,720), availH=Math.max(240, window.innerHeight-250);
  scale=Math.min(1.3,Math.max(0.55, Math.min(availW/(N*TW+24), availH/(N*TH+DZ+110))));
  W=Math.ceil((N*TW+24)*scale); H=Math.ceil((N*TH+DZ+110)*scale);
  canvas.style.width=W+"px"; canvas.style.height=H+"px"; canvas.width=W*DPR; canvas.height=H*DPR;
  ctx.setTransform(DPR*scale,0,0,DPR*scale,0,0);
  ox=(N*TW+24)/2; oy=58;
}
addEventListener("resize",resize);
function iso(r,c){ return [ox+(c-r)*TW/2, oy+(c+r)*TH/2]; }
function tileAt(px,py){ const mx=px/scale-ox, my=py/scale-oy; const a=mx/(TW/2), b=my/(TH/2);
  const c=Math.round((a+b)/2), r=Math.round((b-a)/2); if(r<0||c<0||r>=N||c>=N)return -1; return r*N+c; }

const now=()=>performance.now()/1000;
function shade(hex,f){ const r=parseInt(hex.slice(1,3),16)*f,g=parseInt(hex.slice(3,5),16)*f,b=parseInt(hex.slice(5,7),16)*f;
  return `rgb(${Math.min(255,r)|0},${Math.min(255,g)|0},${Math.min(255,b)|0})`; }

/* ---- sound ---- */
let actx=null,master=null,soundOn=localStorage.getItem("farm-sound")!=="off";
function audio(){ if(actx){if(actx.state==="suspended")actx.resume();return actx;} try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;} master=actx.createGain();master.gain.value=0.3;master.connect(actx.destination);return actx; }
function tone(type,f0,f1,dur,vol){ if(!soundOn)return; const a=audio();if(!a)return;const t=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(f0,t);if(f1!=null)o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.005);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g).connect(master);o.start(t);o.stop(t+dur+0.02); }
const SND={ till(){tone("triangle",240,150,0.09,0.18);}, plant(){tone("sine",420,560,0.08,0.16);},
  water(){tone("sine",950,520,0.12,0.14);}, harvest(){tone("sine",660,990,0.09,0.2);setTimeout(()=>tone("sine",990,1320,0.11,0.16),70);},
  coin(){tone("square",1200,1650,0.06,0.1);}, no(){tone("sawtooth",170,120,0.1,0.14);} };

/* ---- juice ---- */
function float(x,y,text,col){ fx.push({kind:"text",x,y,text,col,life:1}); }
function burst(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*7,s=1+Math.random()*2.5; fx.push({kind:"p",x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,col,life:1}); } }
function splash(x,y){ for(let i=0;i<8;i++){ const a=-Math.PI/2+(Math.random()-0.5)*1.4,s=1+Math.random()*2; fx.push({kind:"p",x,y:y-6,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col:"#8fd0ff",life:1}); } }

/* ---- actions: one tap, context-aware ---- */
function act(i){
  if(i<0)return; const t=grid[i]; const [x,y]=iso((i/N)|0, i%N);
  if(t.state==="grass"){ t.state="soil"; SND.till(); burst(x,y,"#6b4a2b",5); }
  else if(!t.crop){ const C=CROPS[seed]; if(coins>=C.cost){ coins-=C.cost; t.crop={type:seed,grow:0,boost:0}; SND.plant(); float(x,y-10,"-"+C.cost,"#ffd"); syncUI(); }
                     else { SND.no(); float(x,y-10,"need "+C.cost+"c","#ffb3b3"); } }
  else if(t.crop.grow>=1){ const C=CROPS[t.crop.type]; const val=Math.round(C.sell*(1+skills.rich*0.2)); coins+=val; t.crop=null; SND.harvest(); SND.coin(); burst(x,y-14,C.c,14); float(x,y-22,"+"+val,"#ffe27a"); syncUI(); }
  else { t.crop.boost=now()+4; SND.water(); splash(x,y-10); }
  save();
}

/* ---- update + draw ---- */
let lastT=0;
function drawTile(r,c,t,nw){
  const [x,y]=iso(r,c);
  const SK=SKINS[skin];
  const boosted=t.crop&&(sprinklerOn()||now()<t.crop.boost);
  const top=t.state==="grass"?SK.grass:(boosted?shade(SK.soil,0.7):SK.soil);
  ctx.fillStyle=shade(top,0.7); ctx.beginPath(); ctx.moveTo(x-TW/2,y);ctx.lineTo(x,y+TH/2);ctx.lineTo(x,y+TH/2+DZ);ctx.lineTo(x-TW/2,y+DZ);ctx.closePath();ctx.fill();
  ctx.fillStyle=shade(top,0.82); ctx.beginPath(); ctx.moveTo(x+TW/2,y);ctx.lineTo(x,y+TH/2);ctx.lineTo(x,y+TH/2+DZ);ctx.lineTo(x+TW/2,y+DZ);ctx.closePath();ctx.fill();
  ctx.fillStyle=(r*N+c===hover)?shade(top,1.12):top;
  ctx.beginPath(); ctx.moveTo(x,y-TH/2);ctx.lineTo(x+TW/2,y);ctx.lineTo(x,y+TH/2);ctx.lineTo(x-TW/2,y);ctx.closePath();ctx.fill();
  ctx.strokeStyle="rgba(0,0,0,0.12)";ctx.lineWidth=1;ctx.stroke();
  if(t.state==="soil"&&!t.crop){ ctx.strokeStyle="rgba(0,0,0,0.13)"; for(let k=-1;k<=1;k++){ctx.beginPath();ctx.moveTo(x-TW/4+k*8,y-2+k*4);ctx.lineTo(x+TW/4+k*8,y+8+k*4);ctx.stroke();} }
  if(t.crop) drawCrop(x,y,t.crop,nw);
}
function drawCrop(x,y,cr,nw){
  const C=CROPS[cr.type], ratio=Math.min(1,cr.grow), ripe=cr.grow>=1;
  const bob=ripe?Math.sin(nw*4+x)*2:0, h=8+ratio*22+ (ripe?2:0);
  ctx.strokeStyle=C.leaf;ctx.lineWidth=3;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(x,y+4);ctx.lineTo(x,y+4-h+bob);ctx.stroke();
  ctx.fillStyle=C.leaf;
  ctx.beginPath();ctx.ellipse(x-5,y+4-h*0.6+bob,5,3,-0.5,0,7);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+5,y+4-h*0.55+bob,5,3,0.5,0,7);ctx.fill();
  if(ripe){ const r=cr.type==="pumpkin"?8:5;
    const g=0.45+0.35*Math.sin(nw*5); ctx.strokeStyle="rgba(255,255,180,"+g+")";ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y+4-h+bob,r+5,0,7);ctx.stroke();
    ctx.fillStyle=C.c;ctx.beginPath();ctx.arc(x,y+4-h+bob,r,0,7);ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.55)";ctx.beginPath();ctx.arc(x-r*0.4,y+2-h+bob,r*0.3,0,7);ctx.fill();
  } else if(ratio>0.45){ ctx.fillStyle=shade(C.c,0.8);ctx.beginPath();ctx.arc(x,y+4-h,3,0,7);ctx.fill(); }
}
function update(dt){
  for(const t of grid){ if(t.crop && t.crop.grow<1){ const C=CROPS[t.crop.type];
    const sp=(sprinklerOn()||now()<t.crop.boost?2.4:1)*(1+skills.fert*0.25); t.crop.grow=Math.min(1,t.crop.grow+dt/C.dur*sp); } }
  for(let i=fx.length-1;i>=0;i--){ const p=fx[i]; p.life-=dt*(p.kind==="text"?1.1:1.7);
    if(p.kind==="text"){ p.y-=dt*26; } else { p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; }
    if(p.life<=0) fx.splice(i,1); }
}
function drawFx(nw){
  for(const p of fx){ if(p.kind==="text"){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col; ctx.font="700 15px Helvetica,Arial"; ctx.textAlign="center"; ctx.fillText(p.text,p.x,p.y); ctx.globalAlpha=1; }
    else { ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col; ctx.fillRect(p.x-2,p.y-2,4,4); ctx.globalAlpha=1; } }
}
function frame(ts){
  const nw=ts/1000, dt=lastT?Math.min(0.05,nw-lastT):0; lastT=nw;
  update(dt);
  ctx.clearRect(0,0,N*TW+24,N*TH+DZ+110);
  for(let r=0;r<N;r++)for(let c=0;c<N;c++) drawTile(r,c,grid[r*N+c],nw);
  drawFx(nw);
  requestAnimationFrame(frame);
}

/* ---- input ---- */
function evt(e){ const rb=canvas.getBoundingClientRect(); return tileAt(e.clientX-rb.left,e.clientY-rb.top); }
let down=false, lastTill=-1;
canvas.addEventListener("pointerdown",e=>{ audio(); down=true; const i=evt(e); act(i); lastTill=i; });
canvas.addEventListener("pointermove",e=>{ const i=evt(e); hover=i;
  if(down && i>=0 && i!==lastTill && grid[i].state==="grass"){ act(i); lastTill=i; } });   // drag to till only
addEventListener("pointerup",()=>down=false);
canvas.addEventListener("pointerleave",()=>hover=-1);

/* ---- seed shop ---- */
const seedsEl=document.getElementById("seeds");
CKEYS.forEach(k=>{ const C=CROPS[k]; const b=document.createElement("button");
  b.innerHTML=`${C.name}<small>${C.cost}c → ${C.sell}c</small>`; if(k===seed)b.classList.add("on");
  b.addEventListener("click",()=>{ seed=k; [...seedsEl.children].forEach(x=>x.classList.remove("on")); b.classList.add("on"); }); seedsEl.appendChild(b); });

/* ---- shop ---- */
const shopEl=document.getElementById("shop"), upList=document.getElementById("upList"), skinList=document.getElementById("skinList");
function renderShop(){
  document.getElementById("shopCoins").textContent=coins;
  upList.innerHTML=UPGRADES.map(u=>{ const lvl=skills[u.key]||0, maxed=lvl>=u.max, cost=u.cost(lvl);
    const lab=u.max>1?` (lvl ${lvl}/${u.max})`:(lvl?" (owned)":"");
    return `<div class="item"><div><b>${u.name}${lab}</b><span>${u.desc}</span></div>
      <button data-up="${u.key}" ${maxed||coins<cost?"disabled":""}>${maxed?"max":cost+"c"}</button></div>`; }).join("");
  skinList.innerHTML=SKKEYS.map(k=>{ const s=SKINS[k], owned=skinsOwned.includes(k), eq=skin===k;
    return `<div class="item"><span class="sw" style="background:linear-gradient(135deg,${s.grass},${s.soil})"></span>
      <div><b>${s.name}</b><span>${owned?(eq?"equipped":"owned"):s.cost+"c"}</span></div>
      <button data-skin="${k}" ${eq||(!owned&&coins<s.cost)?"disabled":""}>${eq?"✓":owned?"equip":"buy"}</button></div>`; }).join("");
}
shopEl.addEventListener("click",e=>{
  const u=e.target.dataset?.up, k=e.target.dataset?.skin;
  if(u){ const def=UPGRADES.find(d=>d.key===u), lvl=skills[u]||0; if(lvl<def.max && coins>=def.cost(lvl)){ coins-=def.cost(lvl); skills[u]=lvl+1; SND.coin(); save(); syncUI(); renderShop(); } }
  else if(k){ const s=SKINS[k]; if(!skinsOwned.includes(k)){ if(coins<s.cost)return; coins-=s.cost; skinsOwned.push(k); SND.coin(); }
    skin=k; save(); syncUI(); renderShop(); }
});
document.getElementById("shopBtn").addEventListener("click",()=>{ renderShop(); shopEl.classList.add("open"); });
document.getElementById("shopClose").addEventListener("click",()=>shopEl.classList.remove("open"));
shopEl.addEventListener("pointerdown",e=>{ if(e.target===shopEl) shopEl.classList.remove("open"); });

const sndBtn=document.getElementById("snd");
function syncSnd(){ sndBtn.textContent=soundOn?"sound":"muted"; sndBtn.classList.toggle("off",!soundOn); }
sndBtn.addEventListener("click",()=>{ soundOn=!soundOn; localStorage.setItem("farm-sound",soundOn?"on":"off"); syncSnd(); if(soundOn)audio(); });
syncSnd();
document.getElementById("new").addEventListener("click",()=>{ if(confirm("Start a new farm? Progress will be cleared.")) reset(); });

if(!load()) reset(); else syncUI();
resize(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
